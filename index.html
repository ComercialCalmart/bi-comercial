<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CALMART · BI Comercial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ==========================================================
   CALMART BI · folha de estilo
   Direção: instrumento de precisão. Papel frio de fundo azulado,
   tinta azul-marinho, números em mono tabular. Profundidade vem
   de sombras quase invisíveis, nunca de contorno pesado.
   Paleta oficial: marinho #00034A · médio #0D5187 · neon #1887C8
   verde-água #28AC8B · verde claro #95DFC2. Vermelho só para negativo.
   ========================================================== */
:root{
  /* --- superfícies --- */
  --papel:#F5F7FB;
  --carta:#FFFFFF;
  --véu:#FAFBFE;

  /* --- tinta (derivada do marinho) --- */
  --tinta:#00034A;
  --grafite:#5C6689;
  --tenue:#767FA2;
  --linha:#E4E8F2;
  --linha-fina:#EEF1F8;

  /* --- acentos --- */
  --azul:#0D5187;
  --azul-forte:#00034A;
  --azul-neon:#1887C8;
  --azul-claro:#EAF2FA;
  --alta:#12735A;
  --alta-fundo:#E7F6F0;
  --menta:#95DFC2;
  --baixa:#B4322A;
  --baixa-fundo:#FBEDEB;
  --sinal:#28AC8B;

  /* --- forma --- */
  --r:8px;
  --r-p:5px;
  --r-g:12px;
  --sombra:0 1px 2px rgba(0,3,74,.04), 0 1px 3px rgba(0,3,74,.05);
  --sombra-m:0 2px 4px rgba(0,3,74,.05), 0 4px 12px rgba(0,3,74,.06);
  --sombra-g:0 12px 32px rgba(0,3,74,.14), 0 2px 8px rgba(0,3,74,.08);
  --foco:0 0 0 3px rgba(24,135,200,.18);
  --curva:cubic-bezier(.4,0,.2,1);
  --rapido:.14s var(--curva);
  --suave:.2s var(--curva);

  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --cond:'IBM Plex Sans Condensed',system-ui,sans-serif;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--papel);color:var(--tinta);
  font-family:var(--sans);font-size:14px;line-height:1.55;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
}
button{font:inherit;cursor:pointer}
input,select{font:inherit}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.015em}
.alta{color:var(--alta)} .baixa{color:var(--baixa)}
:focus-visible{outline:none;box-shadow:var(--foco);border-radius:var(--r-p)}

/* ---------- login ---------- */
#login{
  min-height:100vh;display:grid;place-items:center;padding:24px;
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(24,135,200,.07) 0%, transparent 60%),
    linear-gradient(var(--linha-fina) 1px,transparent 1px) 0 0/100% 30px,
    var(--papel);
}
.card-login{
  width:100%;max-width:376px;background:var(--carta);
  border:1px solid var(--linha);border-radius:var(--r-g);
  padding:38px 32px 32px;box-shadow:var(--sombra-m);
  animation:sobe .4s var(--curva) both;
}
@keyframes sobe{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.marca{font-family:var(--cond);font-weight:700;font-size:23px;letter-spacing:.15em;margin:0}
.marca span{color:var(--azul-neon)}
.sub{color:var(--grafite);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;margin:8px 0 30px}
label{
  display:block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
  font-weight:500;color:var(--grafite);margin-bottom:6px;
}
.campo{
  width:100%;padding:10px 12px;border:1px solid var(--linha);border-radius:var(--r-p);
  background:var(--véu);color:var(--tinta);margin-bottom:16px;
  transition:border-color var(--rapido), box-shadow var(--rapido), background var(--rapido);
}
.campo:hover{border-color:#D3DAEA}
.campo:focus{border-color:var(--azul-neon);background:var(--carta);outline:none;box-shadow:var(--foco)}
.campo-senha{position:relative;margin-bottom:16px}
.campo-senha .campo{margin-bottom:0;padding-right:40px}
#btnOlho{
  position:absolute;right:3px;top:50%;transform:translateY(-50%);
  width:32px;height:32px;display:grid;place-items:center;
  background:transparent;border:none;color:var(--tenue);border-radius:var(--r-p);
  transition:color var(--rapido), background var(--rapido);
}
#btnOlho:hover{color:var(--azul);background:var(--azul-claro)}
#btnOlho:active{transform:translateY(-50%) scale(.92)}
.lembrar{
  display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;
  font-size:13px;font-weight:400;color:var(--tinta);margin:0 0 20px;cursor:pointer;
  user-select:none;
}
.lembrar input{width:15px;height:15px;margin:0;accent-color:var(--azul-neon);cursor:pointer}
.btn{
  background:var(--azul);color:#fff;border:1px solid var(--azul);
  padding:10px 18px;border-radius:var(--r-p);font-weight:600;font-size:13px;
  letter-spacing:.01em;box-shadow:var(--sombra);
  transition:background var(--rapido), box-shadow var(--rapido), transform var(--rapido);
}
.btn:hover{background:#0B4674;box-shadow:var(--sombra-m)}
.btn:active{transform:translateY(1px);box-shadow:none}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;transform:none}
.btn-2{background:var(--carta);color:var(--tinta);border:1px solid var(--linha)}
.btn-2:hover{background:var(--papel);border-color:#D3DAEA}
.btn-full{width:100%;margin-top:2px}
.erro{color:var(--baixa);font-size:12.5px;min-height:18px;margin:12px 0 0}

/* ---------- casca ---------- */
#app{display:none}
header{
  position:sticky;top:0;z-index:40;
  background:var(--azul-forte);color:#fff;
  padding:0 22px;display:flex;align-items:center;gap:18px;height:54px;
  box-shadow:0 1px 0 rgba(255,255,255,.06) inset;
}
header .marca{font-size:15px;color:#fff;letter-spacing:.16em}
header .marca span{color:var(--menta)}
.dir{margin-left:auto;display:flex;align-items:center;gap:10px}
.quem{font-size:11.5px;color:rgba(255,255,255,.58);font-family:var(--mono)}
.btn-h{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.16);
  color:#fff;padding:6px 13px;border-radius:var(--r-p);font-size:12.5px;font-weight:500;
  transition:background var(--rapido), border-color var(--rapido), transform var(--rapido);
}
.btn-h:hover{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.3)}
.btn-h:active{transform:translateY(1px)}
.btn-h.on{background:var(--azul-neon);border-color:var(--azul-neon)}

.barra{
  position:sticky;top:54px;z-index:30;background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(8px);-webkit-backdrop-filter:saturate(180%) blur(8px);
  border-bottom:1px solid var(--linha-fina);
}
.barra-miolo{
  max-width:1240px;margin:0 auto;padding:10px 22px;
  display:flex;gap:20px;align-items:center;flex-wrap:wrap;
}
/* Legenda de campo (Ano-base, Meta, PETMED...) sem caixa alta e sem
   tracking — o rótulo de grupo acima já marca a seção; o campo em si
   só precisa ser lido rápido, não anunciado. */
.ctrl label{
  text-transform:none;letter-spacing:0;font-weight:500;font-size:10.5px;
  color:var(--tenue);margin-bottom:4px;
}
.ctrl input,.ctrl select{
  padding:6px 10px;border:1px solid var(--linha-fina);border-radius:var(--r-p);
  background:var(--véu);color:var(--tinta);
  transition:border-color var(--rapido), box-shadow var(--rapido), background var(--rapido);
}
.ctrl input:hover,.ctrl select:hover{border-color:#D3DAEA}
.ctrl input:focus,.ctrl select:focus{border-color:var(--azul-neon);background:var(--carta);outline:none;box-shadow:var(--foco)}
.ctrl input{width:78px}
.ctrl .btn-h{
  background:var(--carta);border-color:var(--linha-fina);color:var(--tinta);
}
.ctrl .btn-h:hover{background:var(--papel);border-color:#D3DAEA}
.ref{margin-left:auto;font-size:10.5px;color:var(--tenue);font-family:var(--mono);text-align:right;line-height:1.5}
.selo{
  display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;
  font-weight:600;letter-spacing:.03em;padding:2px 8px;border-radius:100px;margin-bottom:4px;
}
.selo i{width:6px;height:6px;border-radius:50%;display:inline-block}
.selo.fresco{background:var(--alta-fundo);color:var(--alta)}
.selo.fresco i{background:var(--alta)}
.selo.atencao{background:#FDF3E4;color:#8A5A0E}
.selo.atencao i{background:#C9821B}
.selo.velho{background:var(--baixa-fundo);color:var(--baixa)}
.selo.velho i{background:var(--baixa)}

.divisor-ctrl{width:1px;align-self:stretch;background:var(--linha-fina);margin:0 2px}
.grupo-ctrl{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
/* Rótulo de grupo agora é uma etiqueta compacta em linha com os campos,
   não mais uma legenda ocupando a largura inteira acima deles — é essa
   troca (vertical → inline) que tira o ar de "duas fileiras vazias" da
   barra e aproxima o rótulo do que ele está rotulando. */
.rot-grupo{
  font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;
  color:var(--tenue);white-space:nowrap;flex:0 0 auto;
}
.estado-ativo .btn-h{box-shadow:var(--sombra)}

/* ---------- elementos exclusivos do mobile: invisíveis e fora do
   fluxo em qualquer tela maior, sem tocar em nenhuma regra acima ---------- */
.so-mobile,.nav-secoes,.fab-importar{display:none}
.filtros-corpo{display:contents}

/* ---------- resumo (estado da união) ---------- */
.resumo{
  background:linear-gradient(155deg, var(--azul-forte) 0%, #001033 100%);
  color:#fff;border-radius:var(--r-g);padding:26px 30px 28px;margin-bottom:32px;
  box-shadow:var(--sombra-g);animation:entra .32s var(--curva) both;
  position:relative;overflow:hidden;
}
.resumo::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(60% 140% at 100% 0%, rgba(24,135,200,.24) 0%, transparent 65%);
}
.resumo .rot-grupo{color:rgba(255,255,255,.46);margin-bottom:18px}
.resumo-grade{display:grid;grid-template-columns:repeat(3,1fr);gap:0;position:relative}
.resumo-bloco{padding:0 30px}
.resumo-bloco:first-child{padding-left:0}
.resumo-bloco:last-child{padding-right:0}
.resumo-bloco + .resumo-bloco{border-left:1px solid rgba(255,255,255,.14)}
.resumo-label{
  display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.08em;
  text-transform:uppercase;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:12px;
}
.resumo-label i{width:6px;height:6px;border-radius:50%;flex:0 0 auto}
.status-alta .resumo-label i{background:var(--menta)}
.status-atencao .resumo-label i{background:#FFC16E}
.status-baixa .resumo-label i{background:#FF9E93}
.resumo-valor{
  font-family:var(--mono);font-size:29px;font-weight:600;letter-spacing:-.03em;
  color:#fff;line-height:1.05;margin-bottom:10px;
}
.resumo-valor .resumo-unid{
  font-family:var(--sans);font-size:13.5px;font-weight:500;
  color:rgba(255,255,255,.5);letter-spacing:0;margin-left:3px;
}
.resumo-contexto{font-size:12.5px;color:rgba(255,255,255,.62);line-height:1.55}
.resumo-selo{
  display:inline-block;font-family:var(--mono);font-weight:600;
  padding:1px 7px;border-radius:100px;font-size:11px;margin-right:6px;white-space:nowrap;
}
.status-alta .resumo-selo{background:rgba(149,223,194,.16);color:var(--menta)}
.status-atencao .resumo-selo{background:rgba(255,193,110,.18);color:#FFC16E}
.status-baixa .resumo-selo{background:rgba(255,158,147,.18);color:#FF9E93}

/* ---------- bloco 1: meta anual (barra de progresso + ritmo) ---------- */
.meta-barra{
  height:6px;border-radius:100px;background:rgba(255,255,255,.14);
  margin:14px 0 10px;overflow:hidden;
}
.meta-barra-fill{height:100%;border-radius:100px;transition:width .5s var(--curva)}
.status-alta .meta-barra-fill{background:var(--menta)}
.status-atencao .meta-barra-fill{background:#FFC16E}
.status-baixa .meta-barra-fill{background:#FF9E93}
.meta-linha{font-size:12.5px;color:rgba(255,255,255,.72);line-height:1.5;margin-bottom:10px}
.meta-linha b{color:#fff;font-weight:600}
.meta-ritmo{
  display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:11.5px;
  color:rgba(255,255,255,.55);padding-top:10px;border-top:1px solid rgba(255,255,255,.12);
}
.ritmo-chip{
  font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;padding:2px 7px;border-radius:100px;white-space:nowrap;
}
.status-alta .ritmo-chip{background:rgba(149,223,194,.18);color:var(--menta)}
.status-atencao .ritmo-chip{background:rgba(255,193,110,.2);color:#FFC16E}
.status-baixa .ritmo-chip{background:rgba(255,158,147,.2);color:#FF9E93}

@media(max-width:780px){
  .resumo-grade{grid-template-columns:1fr;gap:20px}
  .resumo-bloco{padding:0 0 18px!important;border:none!important}
  .resumo-bloco:not(:last-child){border-bottom:1px solid rgba(255,255,255,.12)!important}
  .resumo-bloco:last-child{padding-bottom:0!important}
}
@media(max-width:640px){ .resumo{padding:20px 20px 22px} .resumo-valor{font-size:25px} }

/* ---------- dica de interação ---------- */
.dica{
  display:inline-flex;align-items:center;gap:5px;font-size:9.5px;letter-spacing:.06em;
  text-transform:none;font-weight:500;color:var(--azul);background:var(--azul-claro);
  padding:3px 9px 3px 7px;border-radius:100px;
}
.dica svg{width:11px;height:11px;flex:0 0 auto}

main{max-width:1240px;margin:0 auto;padding:30px 22px 96px}

/* ---------- seções ---------- */
section{margin-bottom:40px;animation:entra .32s var(--curva) both}
@keyframes entra{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.cab{
  display:flex;align-items:baseline;gap:12px;margin-bottom:16px;
  border-bottom:1px solid var(--linha);padding-bottom:11px;
}
h2{
  font-family:var(--cond);font-size:16px;font-weight:600;letter-spacing:.06em;
  margin:0;text-transform:uppercase;color:var(--tinta);
}
.tag{
  font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;
  color:var(--azul);background:var(--azul-claro);border:none;
  padding:3px 8px;border-radius:100px;
}

/* ---------- cartões ---------- */
.grade{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(196px,1fr))}
.kpi{
  background:var(--carta);border:1px solid var(--linha);border-radius:var(--r);
  padding:16px 18px;box-shadow:var(--sombra);
  transition:box-shadow var(--suave), border-color var(--suave), transform var(--suave);
}
.kpi:hover{box-shadow:var(--sombra-m);border-color:#D8DFEE;transform:translateY(-1px)}
.kpi .rot{
  font-size:10px;letter-spacing:.11em;text-transform:uppercase;
  font-weight:500;color:var(--grafite);
}
.kpi .val{
  font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-.035em;
  margin:9px 0 5px;line-height:1.1;color:var(--tinta);
}
.kpi .pe{font-size:11px;color:var(--tenue);font-family:var(--mono)}
.chip{
  display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:100px;letter-spacing:-.01em;
}
.chip.up{background:var(--alta-fundo);color:var(--alta)}
.chip.down{background:var(--baixa-fundo);color:var(--baixa)}

/* ---------- painel/gráfico ---------- */
.painel{
  background:var(--carta);border:1px solid var(--linha);border-radius:var(--r);
  padding:20px;box-shadow:var(--sombra);
}
svg{display:block;width:100%;height:auto}
.leg{
  display:flex;gap:20px;flex-wrap:wrap;font-size:11.5px;color:var(--grafite);
  margin-top:16px;padding-top:14px;border-top:1px solid var(--linha-fina);
}
.leg i{display:inline-block;width:10px;height:10px;margin-right:6px;vertical-align:-1px;border-radius:3px}
svg rect[data-mes]{cursor:pointer;transition:opacity var(--rapido)}
svg rect[data-mes]:hover{opacity:.78}

/* ---------- tabelas ---------- */
.rolo{
  overflow-x:auto;background:var(--carta);border:1px solid var(--linha);
  border-radius:var(--r);box-shadow:var(--sombra);
}
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;font-family:var(--cond);font-weight:600;font-size:10.5px;
  letter-spacing:.09em;text-transform:uppercase;color:var(--grafite);
  padding:11px 14px;border-bottom:1px solid var(--linha);white-space:nowrap;
  position:sticky;top:0;background:var(--carta);z-index:1;
}
td{padding:10px 14px;border-bottom:1px solid var(--linha-fina);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background var(--rapido)}
tbody tr:hover{background:var(--véu)}
.d{text-align:right}

/* ---------- cabeçalho ordenável ---------- */
th[data-sort]{cursor:pointer;user-select:none;transition:color var(--rapido)}
th[data-sort]:hover{color:var(--azul)}
th[data-sort] .seta{
  display:inline-block;margin-left:5px;font-size:8px;opacity:.32;
  color:var(--tenue);transition:opacity var(--rapido),color var(--rapido);
}
th[data-sort][aria-sort="ascending"],
th[data-sort][aria-sort="descending"]{color:var(--azul)}
th[data-sort][aria-sort="ascending"] .seta,
th[data-sort][aria-sort="descending"] .seta{opacity:1;color:var(--azul-neon)}

/* Linha da ABC é clicável: abre o desempenho mensal daquele cliente. */
table.abc tbody tr[data-ck]{cursor:pointer}
table.abc tbody tr[data-ck]:focus-visible{outline:none;box-shadow:inset 0 0 0 2px var(--azul-neon)}

.classe{
  font-family:var(--mono);font-size:10.5px;font-weight:600;
  padding:2px 7px;border-radius:100px;
}
.cA{background:var(--azul-claro);color:var(--azul)}
.cB{background:#EDF0F7;color:var(--grafite)}
.cC{background:#F4F6FA;color:var(--tenue)}
.pill{font-size:10.5px;font-family:var(--mono);padding:2px 8px;border-radius:100px}
.pill.ok{background:var(--alta-fundo);color:var(--alta)}
.pill.no{background:var(--baixa-fundo);color:var(--baixa)}
.pill.at{background:var(--azul-claro);color:var(--azul)}
.abas{display:flex;gap:7px;margin-bottom:14px}
.abcGrid{display:grid;grid-template-columns:1.6fr 1fr;gap:14px}
@media(max-width:860px){ .abcGrid{grid-template-columns:1fr} }
/* Sem align-items:start os dois cartões esticam pra mesma altura (o
   padrão do grid), então a tabela e o donut sempre terminam na mesma
   linha. O donut, que naturalmente é mais baixo, usa a sobra de altura
   pra centralizar o próprio conteúdo em vez de deixar vazio embaixo. */
.painel-donut{display:flex;flex-direction:column;justify-content:center}
.aba{
  border:1px solid var(--linha);background:var(--carta);padding:6px 14px;
  border-radius:100px;font-size:12.5px;font-weight:500;color:var(--grafite);
  transition:background var(--rapido), color var(--rapido), border-color var(--rapido), transform var(--rapido);
}
.aba:hover{border-color:#D3DAEA;color:var(--tinta)}
.aba:active{transform:translateY(1px)}
.aba.on{background:var(--azul);color:#fff;border-color:var(--azul);box-shadow:var(--sombra)}

/* ---------- vazio / modal ---------- */
.vazio{
  background:var(--carta);border:1px dashed #D8DFEE;border-radius:var(--r);
  padding:56px 24px;text-align:center;
}
.esqueleto .barra-sk{
  height:14px;border-radius:5px;margin-bottom:10px;
  background:linear-gradient(90deg,var(--linha-fina) 25%,var(--linha) 50%,var(--linha-fina) 75%);
  background-size:200% 100%;animation:pulsa 1.3s ease-in-out infinite;
}
@keyframes pulsa{0%{background-position:200% 0}100%{background-position:-200% 0}}
.vazio h3{
  font-family:var(--cond);font-size:15px;letter-spacing:.07em;text-transform:uppercase;
  margin:0 0 10px;color:var(--tinta);
}
.vazio p{color:var(--grafite);max-width:460px;margin:0 auto 22px;font-size:13.5px}
.fundo{
  position:fixed;inset:0;background:rgba(0,3,74,.42);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  display:none;place-items:center;z-index:60;padding:20px;
}
.fundo.on{display:grid;animation:aparece .18s var(--curva)}
@keyframes aparece{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--carta);border-radius:var(--r-g);width:100%;max-width:540px;
  padding:30px;box-shadow:var(--sombra-g);
  animation:sobe .26s var(--curva) both;
}
.modal h3{
  font-family:var(--cond);font-size:16px;letter-spacing:.06em;text-transform:uppercase;
  margin:0 0 8px;color:var(--tinta);
}

/* ---------- popup de desempenho do cliente ---------- */
.modal-cliente{max-width:760px;position:relative;padding-top:44px}
.fechar-x{
  position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;
  background:var(--papel);border:1px solid var(--linha);color:var(--grafite);
  font-size:17px;line-height:1;display:grid;place-items:center;padding:0;
  transition:background var(--rapido),color var(--rapido),transform var(--rapido);
}
.fechar-x:hover{background:var(--azul-claro);color:var(--azul)}
.fechar-x:active{transform:scale(.92)}
.cliente-sub{color:var(--grafite);font-size:12.5px;margin:0 0 16px}
/* Linha do topo do popup: abas de ano à esquerda, total abreviado à
   direita — o mesmo valor que muda de cara quando você troca de aba. */
.cliente-topo{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:14px;flex-wrap:wrap;margin-bottom:16px;
}
.cliente-total{text-align:right}
.cliente-total-valor{
  font-family:var(--mono);font-size:23px;font-weight:600;
  color:var(--tinta);letter-spacing:-.02em;line-height:1.05;
}
.cliente-total-rot{
  font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--tenue);margin-top:2px;white-space:nowrap;
}

.zona{
  border:1px dashed #D8DFEE;border-radius:var(--r);padding:30px;text-align:center;
  color:var(--grafite);margin:20px 0;
  transition:border-color var(--rapido), background var(--rapido);
}
.zona:hover{border-color:var(--azul-neon)}
.zona.dentro{border-color:var(--azul-neon);background:var(--azul-claro)}
.log{
  font-family:var(--mono);font-size:11.5px;line-height:1.6;background:var(--papel);
  border:1px solid var(--linha);border-radius:var(--r-p);padding:12px;
  max-height:158px;overflow:auto;white-space:pre-wrap;margin-top:14px;color:var(--grafite);
}
.fim{display:flex;gap:9px;justify-content:flex-end;margin-top:22px}
@media(max-width:640px){
  .barra-miolo{
    gap:10px;padding:10px 14px;flex-wrap:nowrap;align-items:center;max-width:none;
  }
  .divisor-ctrl{display:none}
  main{padding:16px 14px 96px}
  .kpi .val{font-size:22px}
  .kpi{padding:14px 15px}
  .painel{padding:15px}
  header{padding:0 14px;gap:12px}
  .quem{display:none}
  section,#sec-resumo{margin-bottom:32px;scroll-margin-top:112px}

  /* ---- a barra vira uma única linha compacta: botão de filtros +
     navegação por seção. Os controles detalhados (ano, meta, dias,
     PETMED, status de atualização) saem do fluxo e viram um painel
     suspenso, aberto só sob demanda — a régua de sempre, sem sumir
     com nenhuma funcionalidade, só sem ocupar tela por padrão. ---- */
  .so-mobile{
    display:flex;align-items:center;gap:6px;flex:0 0 auto;position:relative;
    font-size:12.5px;padding:8px 12px;min-height:38px;
  }
  .ponto-filtro{
    display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--menta);
    box-shadow:0 0 0 2px rgba(255,255,255,.5);
  }
  .nav-secoes{
    display:flex;gap:6px;overflow-x:auto;scroll-snap-type:x proximity;
    -webkit-overflow-scrolling:touch;flex:1 1 auto;min-width:0;
    mask-image:linear-gradient(90deg,transparent,#000 12px,#000 92%,transparent);
  }
  .nav-secoes::-webkit-scrollbar{display:none}
  .pilula{
    scroll-snap-align:start;flex:0 0 auto;font-size:12px;font-weight:500;
    padding:7px 13px;border-radius:100px;border:1px solid var(--linha);
    background:var(--carta);color:var(--grafite);white-space:nowrap;
    transition:background .14s var(--curva),color .14s var(--curva),border-color .14s var(--curva);
  }
  .pilula:active{transform:scale(.95)}
  .pilula.on{background:var(--azul);color:#fff;border-color:var(--azul);font-weight:600}

  .filtros-corpo{
    display:none;position:absolute;top:calc(100% + 6px);left:14px;right:14px;
    background:var(--carta);border:1px solid var(--linha);border-radius:var(--r-g);
    box-shadow:var(--sombra-g);padding:18px 18px 16px;z-index:35;
    flex-direction:column;gap:16px;
    animation:sobe .16s var(--curva) both;
  }
  .filtros-corpo.aberta{display:flex}
  .filtros-corpo .grupo-ctrl{gap:14px 18px;align-items:flex-end}
  .filtros-corpo .rot-grupo{width:100%;margin-bottom:5px;white-space:normal}
  .filtros-corpo .ref{width:100%;text-align:left;margin:2px 0 0;padding-top:14px;border-top:1px solid var(--linha-fina)}

  /* ---- toque: nada abaixo de ~44px, ninguém erra o alvo ---- */
  button,.btn,.btn-h,.aba,.classe,select,input{touch-action:manipulation}
  .btn-h{min-height:40px;padding:8px 14px}
  .aba{min-height:40px;padding:9px 16px;display:inline-flex;align-items:center}
  #btnOlho{width:40px;height:40px}
  .ctrl input,.ctrl select{min-height:40px;padding:9px 11px}
  .ctrl input{width:64px}
  .btn,.btn-full{min-height:46px}
  .lembrar{min-height:44px;align-items:center}
  .lembrar input{width:19px;height:19px}
  .grade{gap:12px}

  /* respiro entre os dois grupos dentro do painel suspenso */
  .filtros-corpo .grupo-ctrl + .grupo-ctrl{padding-top:14px;border-top:1px solid var(--linha-fina)}

  /* ---- iOS entende "16px+" como sinal de que não precisa dar zoom ---- */
  .campo,.ctrl input,.ctrl select{font-size:16px}

  /* ---- feedback de toque imediato, antes de qualquer resposta do banco ---- */
  .btn:active,.btn-h:active,.aba:active{transform:scale(.96);transition:transform .1s var(--curva)}
  .kpi:active{transform:scale(.98)}
  tbody tr:active{background:var(--azul-claro)}

  /* ---- tabelas largas: rolagem horizontal com aviso visual de que continua ---- */
  .rolo{
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:x proximity;
    background:
      linear-gradient(90deg,var(--carta) 0%,transparent 3%) ,
      linear-gradient(270deg,var(--carta) 0%,transparent 3%) ,
      radial-gradient(farthest-side at 0 50%, rgba(0,3,74,.08), transparent) ,
      radial-gradient(farthest-side at 100% 50%, rgba(0,3,74,.08), transparent) 100% 0;
    background-repeat:no-repeat;
    background-size:24px 100%,24px 100%,10px 100%,10px 100%;
    background-attachment:local,local,scroll,scroll;
  }
  th,td{padding:10px 12px}

  /* ---- perdidos e cadência: lista de cards em vez de tabela apertada ----
     Ativa só quando o JS marca a tabela com data-empilhar (telas <640px
     é exatamente onde a rolagem lateral por dentro de um card cansa
     mais que rolar a página inteira). A tabela em si nunca muda; é
     só a apresentação que troca de linha para cartão. */
  .rolo table[data-empilhar] thead{display:none}
  .rolo table[data-empilhar],
  .rolo table[data-empilhar] tbody,
  .rolo table[data-empilhar] tr{display:block;width:100%}
  .rolo table[data-empilhar]{background:none}
  .rolo:has(table[data-empilhar]){background:none;border:none;box-shadow:none}
  .rolo table[data-empilhar] tr{
    padding:14px 15px;margin:10px;border:1px solid var(--linha);border-radius:var(--r);
    box-shadow:var(--sombra);background:var(--carta);
  }
  .rolo table[data-empilhar] tr:active{background:var(--véu)}
  .rolo table[data-empilhar] td{
    display:flex;justify-content:space-between;align-items:baseline;gap:14px;
    white-space:normal;border:none;padding:5px 0;font-size:13px;
  }
  .rolo table[data-empilhar] td::before{
    content:attr(data-rot);color:var(--grafite);font-size:10.5px;letter-spacing:.06em;
    text-transform:uppercase;font-weight:500;flex:0 0 auto;
  }
  .rolo table[data-empilhar] td:first-child{
    font-weight:600;font-size:14.5px;color:var(--tinta);padding-bottom:8px;
    margin-bottom:6px;border-bottom:1px solid var(--linha-fina);
  }
  .rolo table[data-empilhar] td:first-child::before{content:none}
  .rolo table[data-empilhar] tr:has(td[colspan]){padding:0;border:none;box-shadow:none;background:none}
  .rolo table[data-empilhar] tr:has(td[colspan]) td{display:block;text-align:center}

  /* ---- ABC tem posição + classe + nome antes das métricas: quem
     lidera o cartão aqui é o nome (3ª coluna), não a posição. Nada
     de coluna escondida, só a mesma informação com a hierarquia
     certa: posição e classe viram uma linha compacta acima do nome. ---- */
  .rolo table[data-empilhar].abc td:first-child{
    font-weight:500;font-size:11px;color:var(--tenue);letter-spacing:.04em;
    padding-bottom:2px;margin-bottom:0;border-bottom:none;
  }
  .rolo table[data-empilhar].abc td:first-child::before{content:attr(data-rot)}
  .rolo table[data-empilhar].abc td:nth-child(2){padding-bottom:6px}
  .rolo table[data-empilhar].abc td:nth-child(3){
    font-weight:600;font-size:14.5px;color:var(--tinta);
    padding:2px 0 9px;margin-bottom:6px;border-bottom:1px solid var(--linha-fina);
    display:block;
  }

  /* ---- modal de importação vira bottom sheet: mais fácil de alcançar com o polegar ---- */
  .fundo{align-items:flex-end;padding:0}
  .fundo.on{display:flex}
  .modal{
    max-width:none;width:100%;border-radius:18px 18px 0 0;
    padding:22px 20px calc(20px + env(safe-area-inset-bottom));
    animation:sobeFolha .22s var(--curva) both;
  }
  @keyframes sobeFolha{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .zona{padding:24px 16px}
  .fim{flex-direction:column-reverse;gap:10px}
  .fim .btn{width:100%;min-height:48px}

  /* ---- FAB de importar: no bolso do polegar, não escondido no header ---- */
  .fab-importar{
    display:flex;align-items:center;justify-content:center;
    position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));
    width:52px;height:52px;border-radius:50%;z-index:45;
    background:var(--azul);color:#fff;border:none;box-shadow:var(--sombra-g);
    transition:transform .14s var(--curva),box-shadow .14s var(--curva);
  }
  .fab-importar:active{transform:scale(.92);box-shadow:var(--sombra-m)}

  /* ---- gráficos de 12 colunas: no desktop cabem espremidos, no dedo
     precisam de largura de verdade. Em vez de espremer, rola de lado
     com respiro por coluna, igual às tabelas viram cartão acima. ---- */
  .graf-rolo{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;margin:0 -15px;padding:0 15px}
  .graf-rolo svg{width:auto;min-width:620px;height:auto}
  .graf-rolo svg rect[data-mes]{scroll-snap-align:start}

  /* ---- estado de carregamento: no mobile, um pouco mais compacto ---- */
  .esqueleto{padding:4px 2px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="card-login">
    <h1 class="marca">CAL<span>MART</span></h1>
    <p class="sub">BI Comercial</p>
    <label for="email">E-mail</label>
    <input id="email" class="campo" type="email" autocomplete="username">
    <label for="senha">Senha</label>
    <div class="campo-senha">
      <input id="senha" class="campo" type="password" autocomplete="current-password">
      <button type="button" id="btnOlho" aria-label="Mostrar senha" aria-pressed="false">
        <svg id="olhoAberto" viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"/><circle cx="10" cy="10" r="2.6"/></svg>
        <svg id="olhoFechado" viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" style="display:none"><path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"/><circle cx="10" cy="10" r="2.6"/><path d="M2.5 2.5l15 15"/></svg>
      </button>
    </div>
    <label class="lembrar">
      <input type="checkbox" id="lembrar"> Lembrar de mim
    </label>
    <button id="btnEntrar" class="btn btn-full">Entrar</button>
    <p class="erro" id="erroLogin"></p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
  <header>
    <span class="marca">CAL<span>MART</span></span>
    <span style="font-size:12px;color:rgba(255,255,255,.58);letter-spacing:.1em">BI COMERCIAL</span>
    <div class="dir">
      <span class="quem" id="quem"></span>
      <button class="btn-h" id="btnImportar">Importar CSV</button>
      <button class="btn-h" id="btnSair">Sair</button>
    </div>
  </header>

  <div class="barra">
   <div class="barra-miolo">
    <button class="btn-h so-mobile" id="btnToggleFiltros" type="button" aria-expanded="false">
      Filtros <span class="ponto-filtro" id="pontoFiltro" hidden></span>
    </button>

    <nav class="nav-secoes" id="navSecoes" aria-label="Ir para seção">
      <button class="pilula" data-alvo="sec-resumo">Resumo</button>
      <button class="pilula" data-alvo="sec-faturamento">Faturamento</button>
      <button class="pilula" data-alvo="sec-carteira">Carteira</button>
      <button class="pilula" data-alvo="sec-abc">ABC</button>
      <button class="pilula" data-alvo="sec-compradores">Compradores</button>
      <button class="pilula" data-alvo="sec-perdidos">Perdidos</button>
      <button class="pilula" data-alvo="sec-cadencia">Cadência</button>
    </nav>

    <div class="filtros-corpo" id="filtrosCorpo">
      <div class="grupo-ctrl">
        <span class="rot-grupo">Configurações</span>
        <div class="ctrl">
          <label for="anoBase">Ano-base</label>
          <select id="anoBase"></select>
        </div>
        <div class="ctrl">
          <label for="meta">Meta de crescimento %</label>
          <input id="meta" type="number" inputmode="numeric" value="10" min="-50" max="200" step="1">
        </div>
        <div class="ctrl">
          <label for="dias">Inativo após (dias)</label>
          <input id="dias" type="number" inputmode="numeric" value="120" min="30" max="720" step="15">
        </div>
      </div>

      <div class="divisor-ctrl"></div>

      <div class="grupo-ctrl estado-ativo">
        <span class="rot-grupo">O que está sendo visto agora</span>
        <div class="ctrl">
          <label>Cliente PETMED</label>
          <button class="btn-h" id="btnPetmed" style="background:var(--azul);border-color:var(--azul);color:#fff">Incluída</button>
        </div>
        <div class="ctrl" id="filtroCtrl" style="display:none">
          <label>Mês em foco</label>
          <button class="btn-h on" id="btnLimparFiltro" style="background:var(--azul);border-color:var(--azul)"></button>
        </div>
      </div>

      <div class="divisor-ctrl"></div>

      <div class="ref" id="ref"></div>
    </div>
   </div>
  </div>

  <main id="main"></main>
</div>

<!-- ============ FAB IMPORTAR (mobile) ============ -->
<button class="fab-importar" id="fabImportar" style="display:none" aria-label="Importar CSV">
  <svg viewBox="0 0 20 20" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3v10M5.5 8.5 10 13l4.5-4.5M4 16.5h12"/></svg>
</button>

<!-- ============ MODAL DE IMPORTAÇÃO ============ -->
<div class="fundo" id="fundo">
  <div class="modal">
    <h3>Importar RFNF613</h3>
    <p style="color:var(--grafite);font-size:13px;margin:0">
      Abra o XLSX do Senior no Excel, salve como CSV e escolha o arquivo aqui.
      A carga substitui os dados anteriores.
    </p>
    <div class="zona" id="zona">
      Arraste o CSV ou <label for="arquivo" style="display:inline;text-transform:none;letter-spacing:0;font-size:14px;color:var(--azul);cursor:pointer;text-decoration:underline">escolha um arquivo</label>
      <input id="arquivo" type="file" accept=".csv,.txt" hidden>
    </div>
    <div class="log" id="log" style="display:none"></div>
    <div class="fim">
      <button class="btn btn-2" id="btnFechar">Fechar</button>
      <button class="btn" id="btnGravar" disabled>Gravar no banco</button>
    </div>
  </div>
</div>

<!-- ============ MODAL DE DESEMPENHO DO CLIENTE ============ -->
<div class="fundo" id="fundoCliente">
  <div class="modal modal-cliente">
    <button class="fechar-x" id="btnFecharCliente" type="button" aria-label="Fechar">×</button>
    <h3 id="clienteNome">Cliente</h3>
    <p class="cliente-sub" id="clienteSub"></p>
    <div id="clienteGraficoZona"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ==========================================================
   1. CONFIGURAÇÃO
   Tudo que muda com regra de negócio mora aqui. Editar
   este bloco não exige entender o resto do arquivo.
   ========================================================== */
const CONFIG = {
  SUPABASE_URL : 'https://limkqsbhblbctpajzjdz.supabase.co',
  SUPABASE_ANON: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpbWtxc2JoYmxiY3RwYWp6amR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ4MDE3NjMsImV4cCI6MjEwMDM3Nzc2M30.MI-6648LdocP-lX7gqIO3WiMnHp7QoJYe65l3uE-n7o',

  // Clientes tratados como venda indireta. Ficam de fora da cadência.
  GALPAO_DROP: ['GALPAO DROP', 'GALPÃO DROP'],

  // Cliente institucional que pode ser ligado/desligado no topo.
  PETMED: ['PET MED', 'PETMED'],

  // Grupos econômicos: CNPJs diferentes, mesmo dono.
  // 'contem' casa por pedaço do nome, em maiúsculas.
  GRUPOS: [
    { nome:'NIPPO + LUNIM',            contem:['NIPPO','LUNIM'] },
    { nome:'FABIANA + MASTER PET',     contem:['FABIANA','MASTER PET'] },
    { nome:'DOGNIFICO + COMP. BR + SJR', contem:['DOGNIFICO','COMPONENTES BR','SJR'] }
  ],

  // DIAS_INATIVO e META_CRESCIMENTO não moram aqui: o usuário controla
  // os dois em tempo real pelos campos #dias e #meta na barra superior
  // (valores iniciais definidos direto no HTML, 120 e 10).
  MIN_COMPRAS_RITMO : 4,    // menos que isso não dá para medir cadência
  ATRASO_MINIMO     : 21    // dias de atraso para entrar na worklist
};

/* ==========================================================
   2. INFRA
   ========================================================== */
// "Lembrar de mim" sem inventar mecanismo próprio: continua sendo o
// supabase-js quem gera, guarda e renova o token de sessão. A única
// escolha nossa é ONDE ele guarda esse token — localStorage (sobrevive
// fechar o navegador) ou sessionStorage (some ao fechar a aba). Nunca
// passa senha por aqui, só o token que o próprio Supabase emite.
const CHAVE_LEMBRAR = 'calmart_bi_lembrar';
const storageSessao = {
  getItem: (k) => window.localStorage.getItem(k) ?? window.sessionStorage.getItem(k),
  setItem: (k, v) => {
    const lembrar = window.localStorage.getItem(CHAVE_LEMBRAR) === '1';
    (lembrar ? window.localStorage : window.sessionStorage).setItem(k, v);
  },
  removeItem: (k) => { window.localStorage.removeItem(k); window.sessionStorage.removeItem(k); }
};
const sb = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON, {
  auth: { storage: storageSessao, persistSession: true, autoRefreshToken: true }
});
const $  = s => document.querySelector(s);
const el = (t,c,x)=>{const n=document.createElement(t);if(c)n.className=c;if(x!=null)n.textContent=x;return n;};

const brl = v => 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const mil = v => (v||0).toLocaleString('pt-BR',{maximumFractionDigits:0});
const pct = v => (v>=0?'+':'') + v.toFixed(1).replace('.',',') + '%';
const dbr = d => d ? d.toLocaleDateString('pt-BR',{timeZone:'UTC'}) : '—';
const MES = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

let DADOS = [];            // linhas cruas vindas do banco
let PENDENTE = null;       // linhas parseadas aguardando gravação
let PETMED_ON = true;
let PODE_IMPORTAR = false;  // definido no login, a partir da tabela perfis
let FILTRO_MES = null;      // {ano, mes} quando uma coluna do gráfico está selecionada
let CORTE_CADENCIA = CONFIG.ATRASO_MINIMO; // aba de dias escolhida em Cadência, sobrevive a qualquer re-render

// Estado de ordenação por clique de cabeçalho, um por tabela. col=null

   4. CARREGAR DO BANCO
   PostgREST devolve no máximo 1000 linhas por vez, então
   pagina até acabar.
   ========================================================== */
async function carregar(){
  $('#main').innerHTML = `<div class="esqueleto">
    <div class="resumo" style="background:var(--carta);box-shadow:none;border:1px solid var(--linha)">
      <div class="barra-sk" style="width:40%;height:11px"></div>
      <div class="barra-sk" style="width:70%;height:26px;margin-top:12px"></div>
    </div>
    <div class="grade" style="margin-top:18px">
      <div class="kpi"><div class="barra-sk" style="width:60%"></div><div class="barra-sk" style="width:80%;height:22px"></div></div>
      <div class="kpi"><div class="barra-sk" style="width:50%"></div><div class="barra-sk" style="width:70%;height:22px"></div></div>
      <div class="kpi"><div class="barra-sk" style="width:65%"></div><div class="barra-sk" style="width:75%;height:22px"></div></div>
    </div>
  </div>`;
  try{
    const linhas = []; const passo = 1000;
    for(let de = 0; ; de += passo){
      const { data, error } = await sb.from('nf_itens')
        .select('nf,emissao,cliente_cod,cliente_nome,produto_cod,produto_desc,qtd,valor,cidade,uf,representante')
        .order('emissao', { ascending:true })
        .range(de, de + passo - 1);
      if(error){ $('#main').innerHTML = `<div class="vazio"><h3>Não deu para ler o banco</h3><p>${error.message}</p></div>`; return; }
      linhas.push(...data);
      if(data.length < passo) break;
    }
    DADOS = linhas.map(r => ({...r, dt:new Date(r.emissao + 'T00:00:00Z'), valor:+r.valor, qtd:+r.qtd}));
    montarAnos();
    render();
  }catch(err){
    $('#main').innerHTML = '<div class="vazio"><h3>Não deu para ler o banco</h3><p>Falha de conexão. Recarregue a página e tente de novo.</p></div>';
  }
}

/* ==========================================================
   5. REGRAS DE NEGÓCIO
   ========================================================== */
function ehGrupo(nome){
  const N = (nome||'').toUpperCase();
  for(const g of CONFIG.GRUPOS) if(g.contem.some(c => N.includes(c))) return g.nome;
  return null;
}
const ehDrop   = n => CONFIG.GALPAO_DROP.some(x => (n||'').toUpperCase().includes(x));
const ehPetmed = n => CONFIG.PETMED.some(x => (n||'').toUpperCase().includes(x));

// Aplica grupo econômico e o filtro PETMED. Devolve linhas com
// clienteKey/clienteNome já consolidados.
function base(){
  return DADOS
    .filter(r => PETMED_ON || !ehPetmed(r.cliente_nome))
    .map(r => {
      const g = ehGrupo(r.cliente_nome);
      return {...r, ck: g || r.cliente_cod, cn: g || r.cliente_nome};
    });
}

const dia = 86400000;
const diasEntre = (a,b) => Math.round((b - a)/dia);
function mediana(v){
  const s=[...v].sort((a,b)=>a-b), m=s.length>>1;
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}

// Último dia do mês (UTC), para tratar o filtro de mês como uma
// data de corte: "como estava a carteira ao final de junho".
function fimDoMes(ano, mes){ return new Date(Date.UTC(ano, mes+1, 0)); }

// Dado um filtro de mês, devolve o histórico truncado naquela data
// e a própria data de corte. Sem filtro, devolve tudo e hoje.
function corteHistorico(B, hoje, filtroMes){
  if(!filtroMes) return { H:B, ref:hoje };
  const fim = fimDoMes(filtroMes.ano, filtroMes.mes);
  const ref = fim < hoje ? fim : hoje;
  return { H: B.filter(r => r.dt <= ref), ref };
}

function montarAnos(){
  const anos = [...new Set(DADOS.map(r => r.dt.getUTCFullYear()))].sort((a,b)=>b-a);
  const s = $('#anoBase');
  if(s.options.length && anos.includes(+s.value)) return;
  s.innerHTML = '';
  anos.forEach(a => s.add(new Option(a, a)));
}

/* ---------- cabeçalhos ordenáveis (ABC, Perdidos, Cadência) ----------
   Clicar ordena crescente; clicar de novo no mesmo cabeçalho inverte.
   O estado mora em SORT (fora da função de cada seção), então sobrevive
   ao re-render inteiro que qualquer clique de tabela dispara. */
function thOrd(texto, chave, tabela, opcoes={}){
  const estado = SORT[tabela];
  const ativo = estado.col === chave;
  const dirTxt = ativo ? (estado.dir === 'asc' ? 'ascending' : 'descending') : 'none';
  const seta = ativo ? (estado.dir === 'asc' ? '▲' : '▼') : '⇅';
  return `<th data-sort="${chave}" data-tabela="${tabela}" data-tipo="${opcoes.tipo||'numero'}"
    aria-sort="${dirTxt}" tabindex="0" role="button"${opcoes.alinhar==='d' ? ' class="d"' : ''}
    >${texto}<span class="seta">${seta}</span></th>`;
}

// Ordena uma cópia da lista conforme o clique mais recente naquela
// tabela. Sem clique ainda (col=null), devolve a lista como veio —
// a ordem padrão de cada seção continua sendo a de sempre.
function ordenar(lista, tabela, acessores){
  const estado = SORT[tabela];
  const acc = estado.col && acessores[estado.col];
  if(!acc) return lista;
  const copia = [...lista].sort((a,b) => {
    const va = acc(a), vb = acc(b);
    if(va == null) return vb == null ? 0 : 1;
    if(vb == null) return -1;
    if(va < vb) return -1;
    if(va > vb) return 1;
    return 0;
  });
  if(estado.dir === 'desc') copia.reverse();
  return copia;
}

function alternarOrdenacao(th){
  const tabela = th.dataset.tabela, coluna = th.dataset.sort;
  const estado = SORT[tabela];
  if(estado.col === coluna) estado.dir = estado.dir === 'asc' ? 'desc' : 'asc';
  else { estado.col = coluna; estado.dir = th.dataset.tipo === 'texto' ? 'asc' : 'desc'; }
  render();
}
$('#main').addEventListener('click', e => {
  const th = e.target.closest('th[data-sort]');
  if(th) alternarOrdenacao(th);
});
$('#main').addEventListener('keydown', e => {
  if(e.key !== 'Enter' && e.key !== ' ') return;
  const th = e.target.closest('th[data-sort]');
  if(!th) return;
  e.preventDefault();
  alternarOrdenacao(th);
});

/* ==========================================================
   6.3c popup de desempenho mensal do cliente (clique na linha da ABC)
   Sempre desde janeiro/2025 até o mês mais recente da base, ignorando
   qualquer mês em foco — é uma foto do histórico inteiro daquele
   cliente, igual "última compra"/"situação" já fazem na própria ABC.
   ========================================================== */
const ANO_INICIO_HISTORICO = 2025, MES_INICIO_HISTORICO = 0; // janeiro

function serieMensalCliente(ck){
  const B = base();
  if(!B.length) return [];
  const hoje = new Date(Math.max(...B.map(r => r.dt)));
  const anoFim = hoje.getUTCFullYear(), mesFim = hoje.getUTCMonth();

  const somaPorMes = {};
  B.forEach(r => { if(r.ck !== ck) return;
    const k = r.dt.getUTCFullYear() + '-' + r.dt.getUTCMonth();
    somaPorMes[k] = (somaPorMes[k] || 0) + r.valor;
  });

  const serie = [];
  let ano = ANO_INICIO_HISTORICO, mes = MES_INICIO_HISTORICO;
  while(ano < anoFim || (ano === anoFim && mes <= mesFim)){
    serie.push({ ano, mes, valor: somaPorMes[ano+'-'+mes] || 0 });
    mes++; if(mes > 11){ mes = 0; ano++; }
  }
  return serie;
}

function linhaCliente(serie){
  const W=680, H=240, e=52, d=16, t=20, b=32;
  const max = Math.max(...serie.map(p => p.valor), 1) * 1.15;
  const lg = (W-e-d) / Math.max(serie.length-1, 1);
  const y = v => t + (H-t-b) * (1 - v/max);
  const x = i => e + i*lg;
  // Com muitos meses na tela (ex: "Tudo"), rotular cada um vira sopa de
  // letrinhas — então rotula 1 a cada N, sempre incluindo o último mês.
  const pulo = serie.length > 15 ? 3 : serie.length > 8 ? 2 : 1;

  let g = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Faturamento mensal do cliente">`;
  for(let i=0;i<=4;i++){
    const v = max*i/4, yy = y(v);
    g += `<line x1="${e}" y1="${yy}" x2="${W-d}" y2="${yy}" stroke="#EEF1F8"/>
          <text x="${e-8}" y="${yy+4}" text-anchor="end" font-family="IBM Plex Mono" font-size="10" fill="#8C94B2">${Math.round(v/1000)}k</text>`;
  }
  const pontos = serie.map((p,i) => `${x(i).toFixed(1)},${y(p.valor).toFixed(1)}`).join(' ');
  const area = `${x(0).toFixed(1)},${y(0).toFixed(1)} ${pontos} ${x(serie.length-1).toFixed(1)},${y(0).toFixed(1)}`;
  g += `<polygon points="${area}" fill="var(--azul-claro)" opacity="0.55"/>`;
  g += `<polyline points="${pontos}" fill="none" stroke="var(--azul)" stroke-width="2"/>`;
  serie.forEach((p,i) => {
    g += `<circle cx="${x(i).toFixed(1)}" cy="${y(p.valor).toFixed(1)}" r="3.5" fill="var(--azul)" stroke="#fff" stroke-width="1.5">
            <title>${MES[p.mes]}/${p.ano}: ${brl(p.valor)}</title>
          </circle>`;
    if(i % pulo === 0 || i === serie.length-1){
      g += `<text x="${x(i).toFixed(1)}" y="${H-10}" text-anchor="middle" font-family="IBM Plex Sans Condensed" font-size="10" fill="#5C6689">${MES[p.mes]}/${String(p.ano).slice(2)}</text>`;
    }
  });
  g += `<line x1="${e}" y1="${H-b}" x2="${W-d}" y2="${H-b}" stroke="#00034A"/></svg>`;
  return g;
}

// R$ 445.000,00 vira "445k" — só pro número grande do canto, que
// precisa bater o olho rápido, não pedir conta. O resto do dashboard
// continua com o valor por extenso (brl()); essa abreviação é local.
function abrevBRL(v){
  const sinal = v < 0 ? '−' : '';
  const av = Math.abs(v);
  if(av >= 1000000) return sinal + (av/1000000).toFixed(1).replace('.',',') + 'M';
  if(av >= 1000) return sinal + Math.round(av/1000) + 'k';
  return sinal + Math.round(av);
}

/* ---------- navegação rápida por seção (mobile) ----------
   Rola até a seção e marca a pílula correspondente conforme o que
   está realmente visível, não conforme o que foi clicado por último
   — assim continua certa mesmo se o usuário rolar com o dedo. */
const navSecoes = $('#navSecoes');
let observadorSecoes = null;
if(navSecoes){
  navSecoes.addEventListener('click', e => {
    const b = e.target.closest('.pilula');
    if(!b) return;
    document.getElementById(b.dataset.alvo)?.scrollIntoView?.({ behavior:'smooth', block:'start' });
  });
}
function iniciarNavSecoes(){
  if(!navSecoes || typeof IntersectionObserver === 'undefined') return;
  observadorSecoes?.disconnect();
  const alvos = [...navSecoes.querySelectorAll('.pilula')]
    .map(b => document.getElementById(b.dataset.alvo))
    .filter(Boolean);
  if(!alvos.length) return;
  observadorSecoes = new IntersectionObserver(entradas => {
    entradas.forEach(en => {
      if(!en.isIntersecting) return;
      const alvo = en.target.id;
      navSecoes.querySelectorAll('.pilula').forEach(b =>
        b.classList.toggle('on', b.dataset.alvo === alvo));
      const on = navSecoes.querySelector('.pilula.on');
      on?.scrollIntoView?.({ behavior:'smooth', inline:'center', block:'nearest' });
    });
  }, { rootMargin:'-112px 0px -70% 0px', threshold:0 });
  alvos.forEach(a => observadorSecoes.observe(a));
}
