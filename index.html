// Compara a última NF da base com a data real de hoje (relógio do
// navegador), não com "hoje" do dashboard, que é sempre a última NF.
// É o único jeito de saber se a importação semanal está em dia.
function seloAtualizacao(hoje){
  const agora = new Date();
  const agoraUTC = new Date(Date.UTC(agora.getFullYear(), agora.getMonth(), agora.getDate()));
  const dias = diasEntre(hoje, agoraUTC);
  const [nivel, texto] = dias <= 2 ? ['fresco','atualizado']
    : dias <= 7 ? ['atencao','verificar import.']
    : ['velho','desatualizado'];
  return `<span class="selo ${nivel}"><i></i>${texto}</span>`;
}

function render(){
  const m = $('#main');
  if(!DADOS.length){
    m.innerHTML = PODE_IMPORTAR
      ? `<div class="vazio">
          <h3>Nenhum dado no banco</h3>
          <p>Extraia o RFNF613 no Senior, salve como CSV e use o botão Importar CSV no topo.
             O dashboard monta tudo em seguida.</p>
          <button class="btn" onclick="document.getElementById('fundo').classList.add('on')">Importar CSV</button>
        </div>`
      : `<div class="vazio">
          <h3>Nenhum dado no banco</h3>
          <p>A base ainda não foi carregada nesta semana. Avise quem cuida da importação
             e recarregue a página em seguida.</p>
        </div>`;
    $('#ref').textContent = '';
    return;
  }

  const B    = base();
  const ano  = +$('#anoBase').value;
  const meta = +$('#meta').value / 100;
  const jan  = +$('#dias').value;
  const hoje = new Date(Math.max(...B.map(r => r.dt)));   // referência = última NF da base

  // Se o mês selecionado for de um ano diferente do ano-base atual,
  // o filtro perdeu o sentido (o usuário trocou o ano no meio do caminho).
  if(FILTRO_MES && FILTRO_MES.ano !== ano) FILTRO_MES = null;
  atualizarChipFiltro();

  $('#ref').innerHTML = seloAtualizacao(hoje) +
    `<br>referência ${dbr(hoje)}<br>${mil(B.length)} itens · ${mil(new Set(B.map(r=>r.nf+r.emissao)).size)} NFs`;

  m.innerHTML = '';
  m.appendChild(secResumo(B, ano, meta, jan, hoje));
  m.appendChild(secFaturamento(B, ano, meta, FILTRO_MES));
  m.appendChild(secCarteira(B, ano, hoje, jan, FILTRO_MES));
  m.appendChild(secABC(B, ano, hoje, jan, FILTRO_MES));
  m.appendChild(secCompradores(B, ano, FILTRO_MES));
  m.appendChild(secPerdidos(B, hoje, jan, FILTRO_MES));
  m.appendChild(secCadencia(B, hoje, FILTRO_MES));
  iniciarNavSecoes();
}

function cabecalho(pai, titulo, tag, nota, dica){
  const c = el('div','cab');
  c.appendChild(el('h2',null,titulo));
  if(tag) c.appendChild(el('span','tag',tag));
  if(dica){
    const d = el('span','dica');
    d.innerHTML = `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 3h9l3 3-3 3H2z"/></svg>${dica}`;
    c.appendChild(d);
  }
  if(nota){
    const n = el('span',null,nota);
    n.style.cssText = 'font-size:11.5px;color:var(--grafite);font-family:var(--mono);margin-left:auto';
    c.appendChild(n);
  }
  pai.appendChild(c);
}
function kpi(rot, val, pe, delta){
  const k = el('div','kpi');
  k.appendChild(el('div','rot',rot));
  k.appendChild(el('div','val',val));
  const p = el('div','pe');
  if(delta != null){
    const c = el('span','chip ' + (delta>=0?'up':'down'), pct(delta));
    p.appendChild(c); p.appendChild(document.createTextNode(' ' + (pe||'')));
  } else p.textContent = pe || '';
  k.appendChild(p);
  return k;
}

function blocoResumo(status, label, valor, unidade, contextoHtml){
  const b = el('div', 'resumo-bloco status-' + status);
  const lab = el('div','resumo-label');
  lab.innerHTML = `<i></i>${label}`;
  const val = el('div','resumo-valor');
  val.innerHTML = unidade ? `${valor}<span class="resumo-unid"> ${unidade}</span>` : valor;
  const ctx = el('div','resumo-contexto');
  ctx.innerHTML = contextoHtml;
  b.append(lab, val, ctx);
  return b;
}

// Bloco 1 do resumo (meta anual): mesma anatomia do blocoResumo — rótulo,
// número grande, contexto — só que com barra de progresso e uma linha de
// ritmo a mais. Só existe pra esse bloco porque só ele tem meta contra
// a qual progredir; os outros dois são contagens, não perseguição de alvo.
function blocoMeta(status, label, valor, pct, linhaMeta, linhaRitmo, contextoExtra){
  const b = el('div', 'resumo-bloco resumo-meta status-' + status);
  const lab = el('div','resumo-label'); lab.innerHTML = `<i></i>${label}`;
  const val = el('div','resumo-valor'); val.textContent = valor;
  const barra = el('div','meta-barra');
  const fill = el('div','meta-barra-fill');
  fill.style.width = Math.min(Math.max(pct,0),100) + '%';
  barra.appendChild(fill);
  const linha = el('div','meta-linha'); linha.innerHTML = linhaMeta;
  b.append(lab, val, barra, linha);
  if(linhaRitmo){ const rt = el('div','meta-ritmo'); rt.innerHTML = linhaRitmo; b.appendChild(rt); }
  if(contextoExtra){ const cx = el('div','resumo-contexto'); cx.style.marginTop='8px'; cx.innerHTML = contextoExtra; b.appendChild(cx); }
  return b;
}

/* ---------- 6.0 resumo (estado da união) ---------- */
// Sempre reflete o estado atual de verdade (não usa FILTRO_MES): é o
// "pulso" do negócio, a leitura de baixo não deveria mudar o resumo
// de cima. Cada bloco é rótulo + número grande + contexto, não frase
// corrida: o número precisa bater o olho antes da explicação.
function secResumo(B, ano, meta, jan, hoje){
  const div = el('div','resumo');
  div.id = 'sec-resumo';
  div.appendChild(el('span','rot-grupo','Resumo de hoje'));
  const grade = el('div','resumo-grade');

  // 1. meta anual (implícita: faturamento total do ano passado inteiro
  // × (1+meta%) — não existe campo de "meta anual em R$" em lugar
  // nenhum, então essa é a única meta anual que dá pra calcular sem
  // inventar uma regra de negócio nova. É construída só com o que já
  // existe: os 12 meses de A/P e o % de crescimento configurado.
  const A = new Array(12).fill(0), P = new Array(12).fill(0);
  B.forEach(r => {
    const y = r.dt.getUTCFullYear(), i = r.dt.getUTCMonth();
    if(y === ano)   A[i] += r.valor;
    if(y === ano-1) P[i] += r.valor;
  });
  const temAno = B.some(r => r.dt.getUTCFullYear() === ano);
  const ultimo = temAno ? Math.max(...B.filter(r=>r.dt.getUTCFullYear()===ano).map(r=>r.dt.getUTCMonth())) : 0;
  const accA = A.slice(0, ultimo+1).reduce((a,b)=>a+b,0);
  const accP = P.slice(0, ultimo+1).reduce((a,b)=>a+b,0);
  const metaAcum = accP*(1+meta);                 // comparação de sempre: mesmo período do ano passado
  const difMeta = metaAcum ? (accA/metaAcum - 1)*100 : 0;

  const metaAnual = P.reduce((a,b)=>a+b,0) * (1+meta);   // meta anual implícita: ano passado inteiro + meta%
  const temMetaAnual = temAno && metaAnual > 0;
  const faltamAnual = metaAnual - accA;
  const pctAnual = temMetaAnual ? accA/metaAnual*100 : 0;
  const mesesPassados = ultimo+1, mesesRestantes = 12 - mesesPassados;
  const ritmoAtual = mesesPassados ? accA/mesesPassados : 0;
  let ritmoNecessario = null, acimaDoRitmo = null;
  if(temMetaAnual){
    if(faltamAnual <= 0) acimaDoRitmo = true;
    else if(mesesRestantes > 0){ ritmoNecessario = faltamAnual/mesesRestantes; acimaDoRitmo = ritmoAtual >= ritmoNecessario; }
    else acimaDoRitmo = false;   // dezembro, meta ainda não batida: não sobra mês pra recuperar
  }
  const statusMeta = !temMetaAnual ? 'atencao' : acimaDoRitmo ? 'alta' : 'baixa';

  const linhaMeta = !temMetaAnual
    ? `Sem faturamento em ${ano-1} para calcular uma meta anual.`
    : faltamAnual > 0
      ? `${pctAnual.toFixed(0)}% de <b>${brl(metaAnual)}</b> · faltam ${brl(faltamAnual)}`
      : `${pctAnual.toFixed(0)}% de <b>${brl(metaAnual)}</b> · meta batida, ${brl(-faltamAnual)} acima`;

  const chip = acimaDoRitmo == null ? ''
    : `<span class="ritmo-chip">${acimaDoRitmo ? 'acima do ritmo' : 'abaixo do ritmo'}</span>`;
  const linhaRitmo = !temMetaAnual ? null
    : ritmoNecessario != null
      ? `${chip} ritmo atual ${brl(ritmoAtual)}/mês · necessário ${brl(ritmoNecessario)}/mês`
      : `${chip} ritmo atual ${brl(ritmoAtual)}/mês`;

  grade.appendChild(blocoMeta(
    statusMeta, `Meta anual · ${ano}`, brl(accA), pctAnual, linhaMeta, linhaRitmo,
    `<span class="resumo-selo">${difMeta>=0?'+':'−'}${Math.abs(difMeta).toFixed(1).replace('.',',')}%</span> vs. mesmo período de ${ano-1}`
  ));

  // 2. clientes atrasados na cadência (mesmo cálculo de secCadencia,
  // com o corte-padrão de CONFIG.ATRASO_MINIMO, sempre sobre o
  // histórico inteiro). Âmbar, não vermelho: é lembrete de ligação,
  // não uma perda, mesma leitura já usada no pill "atraso" da cadência.
  const mCad = {};
  B.forEach(r => {
    if(ehDrop(r.cn)) return;
    mCad[r.ck] = mCad[r.ck] || { datas:new Set(), r12:0 };
    mCad[r.ck].datas.add(r.emissao);
    if(diasEntre(r.dt, hoje) <= 365) mCad[r.ck].r12 += r.valor;
  });
  let atrasados = 0, r12Atrasados = 0;
  Object.values(mCad).forEach(c => {
    const ds = [...c.datas].map(x => new Date(x+'T00:00:00Z')).sort((a,b)=>a-b);
    if(ds.length < CONFIG.MIN_COMPRAS_RITMO) return;
    const gaps = ds.slice(1).map((d,i) => diasEntre(ds[i], d));
    const ritmo = Math.round(mediana(gaps));
    const semComprar = diasEntre(ds[ds.length-1], hoje);
    if(semComprar - ritmo >= CONFIG.ATRASO_MINIMO){ atrasados++; r12Atrasados += c.r12; }
  });
  grade.appendChild(blocoResumo(
    atrasados > 0 ? 'atencao' : 'alta',
    'Cadência · na hora de ligar',
    String(atrasados), atrasados===1?'cliente':'clientes',
    atrasados > 0 ? `${brl(r12Atrasados)} em receita de 12 meses` : 'Ninguém atrasado agora'
  ));

  // 3. clientes que cruzaram a linha de inatividade nos últimos 7 dias:
  // esse sim é perda de verdade, por isso é o único vermelho dos três.
  const ultCompra = {};
  B.forEach(r => { if(!ultCompra[r.ck] || r.dt > ultCompra[r.ck]) ultCompra[r.ck] = r.dt; });
  const perdidosSemana = Object.values(ultCompra)
    .filter(d => { const dd = diasEntre(d, hoje); return dd > jan && dd <= jan+7; }).length;
  grade.appendChild(blocoResumo(
    perdidosSemana > 0 ? 'baixa' : 'alta',
    'Carteira · últimos 7 dias',
    String(perdidosSemana), perdidosSemana===1?'cliente':'clientes',
    perdidosSemana > 0 ? `cruzaram a linha de ${jan} dias sem comprar` : 'Ninguém cruzou a linha de inatividade'
  ));

  div.appendChild(grade);
  return div;
}

/* ---------- 6.1 faturamento mensal ---------- */
function secFaturamento(B, ano, meta, filtroMes){
  const s = el('section'); s.id = 'sec-faturamento';
  const noMes = !!(filtroMes && filtroMes.ano === ano);
  cabecalho(s, noMes ? `Faturamento · ${MES[filtroMes.mes]}/${ano}` : 'Faturamento mensal', 'direção', null, 'clique num mês para focar');

  const A = new Array(12).fill(0), P = new Array(12).fill(0);
  B.forEach(r => {
    const y = r.dt.getUTCFullYear(), i = r.dt.getUTCMonth();
    if(y === ano)   A[i] += r.valor;
    if(y === ano-1) P[i] += r.valor;
  });
  const ultimo = Math.max(...B.filter(r=>r.dt.getUTCFullYear()===ano).map(r=>r.dt.getUTCMonth()));

  const g = el('div','grade');
  if(noMes){
    const mi = filtroMes.mes;
    const dif = P[mi] ? (A[mi]/P[mi] - 1)*100 : 0;
    const metaMes = P[mi]*(1+meta);
    g.appendChild(kpi(`Faturamento em ${MES[mi]}/${ano}`, brl(A[mi]), 'no mês'));
    g.appendChild(kpi(`Mesmo mês em ${ano-1}`, brl(P[mi]), MES[mi]));
    g.appendChild(kpi('Variação sobre o mesmo mês', pct(dif), '', dif));
    g.appendChild(kpi('Meta do mês', brl(metaMes), A[mi] >= metaMes ? 'atingida' : 'faltam ' + brl(metaMes-A[mi])));
  } else {
    const accA = A.slice(0, ultimo+1).reduce((a,b)=>a+b,0);
    const accP = P.slice(0, ultimo+1).reduce((a,b)=>a+b,0);
    const dif  = accP ? (accA/accP - 1)*100 : 0;
    g.appendChild(kpi(`Acumulado ${ano}`, brl(accA), `até ${MES[ultimo]}`));
    g.appendChild(kpi(`Acumulado ${ano-1}`, brl(accP), 'mesmos meses'));
    g.appendChild(kpi('Variação sobre o ano anterior', pct(dif), 'acumulado', dif));
    g.appendChild(kpi('Meta do acumulado', brl(accP*(1+meta)), accA >= accP*(1+meta) ? 'atingida' : 'faltam ' + brl(accP*(1+meta)-accA)));
  }
  s.appendChild(g);

  const p = el('div','painel'); p.style.marginTop = '12px';
  p.innerHTML = `<div class="graf-rolo">${barrasDuplas(A, P, P.map(v=>v*(1+meta)), ultimo, ano, filtroMes)}</div>`;
  p.insertAdjacentHTML('beforeend',
    `<div class="leg">
      <span><i style="background:var(--azul)"></i>${ano}</span>
      <span><i style="background:#C2CCE2"></i>${ano-1}</span>
      <span><i style="background:var(--sinal)"></i>meta (${ano-1} +${(meta*100).toFixed(0)}%)</span>
    </div>`);
  s.appendChild(p);
  return s;
}

function barrasDuplas(A, P, M, ultimo, ano, filtroMes){
  const W=1160,H=300,e=64,d=16,t=22,b=34;
  const max = Math.max(...A, ...P, ...M, 1)*1.12;
  const lg = (W-e-d)/12, y = v => t + (H-t-b)*(1 - v/max);
  let g = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Faturamento mensal comparado">`;
  for(let i=0;i<=4;i++){
    const v = max*i/4, yy = y(v);
    g += `<line x1="${e}" y1="${yy}" x2="${W-d}" y2="${yy}" stroke="#EEF1F8"/>
          <text x="${e-8}" y="${yy+4}" text-anchor="end" font-family="IBM Plex Mono" font-size="10" fill="#8C94B2">${Math.round(v/1000)}k</text>`;
  }
  for(let i=0;i<12;i++){
    const x = e + i*lg, w = lg*0.30;
    const ativo = !!(filtroMes && filtroMes.ano===ano && filtroMes.mes===i);
    if(P[i]>0) g += `<rect x="${x+lg*0.16}" y="${y(P[i])}" width="${w}" height="${H-b-y(P[i])}" fill="#C2CCE2"/>`;
    if(A[i]>0) g += `<rect data-mes="${i}" data-ano="${ano}" x="${x+lg*0.50}" y="${y(A[i])}" width="${w}" height="${H-b-y(A[i])}" fill="var(--azul)" opacity="${i===ultimo && !ativo?0.45:1}"${ativo?' stroke="var(--tinta)" stroke-width="2"':''}><title>${ativo ? 'Clique para soltar o foco' : `Clique para focar em ${MES[i]}/${ano}`}</title></rect>`;
    if(M[i]>0) g += `<line x1="${x+lg*0.46}" y1="${y(M[i])}" x2="${x+lg*0.86}" y2="${y(M[i])}" stroke="var(--sinal)" stroke-width="2" stroke-dasharray="4 3"/>`;
    g += `<text x="${x+lg/2}" y="${H-12}" text-anchor="middle" font-family="IBM Plex Sans Condensed" font-size="${ativo?12:11}" font-weight="${ativo?700:400}" fill="${ativo?'var(--azul)':'#5C6689'}">${MES[i]}</text>`;
  }
  g += `<line x1="${e}" y1="${H-b}" x2="${W-d}" y2="${H-b}" stroke="#00034A"/></svg>`;
  return g;
}

/* ---------- 6.2 carteira ---------- */
function secCarteira(B, ano, hoje, jan, filtroMes){
  const { H, ref } = corteHistorico(B, hoje, filtroMes);
  const s = el('section'); s.id = 'sec-carteira';
  cabecalho(s, 'Carteira de clientes', null, filtroMes ? `como estava em ${dbr(ref)}` : null);

  const ult = {}, pri = {};
  H.forEach(r => {
    if(!ult[r.ck] || r.dt > ult[r.ck]) ult[r.ck] = r.dt;
    if(!pri[r.ck] || r.dt < pri[r.ck]) pri[r.ck] = r.dt;
  });
  const todos   = Object.keys(ult);
  const ativos  = todos.filter(k => diasEntre(ult[k], ref) <= jan);
  const perdidos= todos.length - ativos.length;
  const novos   = todos.filter(k => pri[k].getUTCFullYear() === ano).length;

  const g = el('div','grade');
  g.appendChild(kpi('Carteira total', mil(todos.length), 'clientes com NF no histórico'));
  g.appendChild(kpi('Ativos', mil(ativos.length), `${todos.length ? (ativos.length/todos.length*100).toFixed(0) : 0}% da carteira`));
  g.appendChild(kpi('Perdidos', mil(perdidos), `${todos.length ? (perdidos/todos.length*100).toFixed(0) : 0}% da carteira`));
  g.appendChild(kpi(`Novos em ${ano}`, mil(novos), 'primeira compra no ano'));
  s.appendChild(g);
  return s;
}

/* ---------- 6.3 curva ABC ---------- */
function secABC(B, ano, hoje, jan, filtroMes){
  const s = el('section'); s.id = 'sec-abc';
  const noMes = !!(filtroMes && filtroMes.ano === ano);
  const titulo = noMes ? `Maiores clientes · curva ABC · ${MES[filtroMes.mes]}/${ano}` : `Maiores clientes · curva ABC ${ano}`;
  cabecalho(s, titulo);

  const doPeriodo = B.filter(r => r.dt.getUTCFullYear() === ano && (!noMes || r.dt.getUTCMonth() === filtroMes.mes));
  const m = {};
  doPeriodo.forEach(r => {
    m[r.ck] = m[r.ck] || { nome:r.cn, fat:0, nfs:new Set() };
    m[r.ck].fat += r.valor; m[r.ck].nfs.add(r.nf + r.emissao);
  });
  const ultGeral = {};
  B.forEach(r => { if(!ultGeral[r.ck] || r.dt > ultGeral[r.ck]) ultGeral[r.ck] = r.dt; });

  const lista = Object.entries(m).map(([k,v]) => ({k, ...v})).sort((a,b)=>b.fat-a.fat);
  const tot = lista.reduce((a,b)=>a+b.fat,0);
  let acc = 0;
  lista.forEach((c,i) => { acc += c.fat; c.acc = acc/tot*100; c.share = c.fat/tot*100;
    c.classe = c.acc <= 80 ? 'A' : c.acc <= 95 ? 'B' : 'C';
    c.pos = i+1; c.ultima = ultGeral[c.k]; c.diasSemComprar = diasEntre(ultGeral[c.k], hoje); });

  const nA = lista.filter(c=>c.classe==='A').length;
  const g = el('div','grade');
  g.appendChild(kpi(noMes ? 'Faturamento no mês' : 'Faturamento no ano', brl(tot), `${lista.length} clientes compradores`));
  g.appendChild(kpi('Clientes classe A', mil(nA), '80% do faturamento'));
  g.appendChild(kpi('Concentração no top 5', (lista.slice(0,5).reduce((a,b)=>a+b.share,0)).toFixed(1).replace('.',',')+'%', noMes ? 'do faturamento do mês' : 'do faturamento do ano'));
  s.appendChild(g);

  // A ordenação por clique só reordena a exibição da tabela. Posição,
  // classe, % acumulado e o donut continuam vindo da ordem original
  // por faturamento (é o que dá sentido ao Pareto) — só quem muda de
  // posição na tela é a linha, nunca o cálculo por trás dela.
  const listaOrdenada = ordenar(lista, 'abc', {
    pos: c => c.pos,
    classe: c => c.classe,
    cliente: c => c.nome.toLowerCase(),
    faturamento: c => c.fat,
    pctTotal: c => c.share,
    pctAcum: c => c.acc,
    nfs: c => c.nfs.size,
    ultima: c => c.ultima ? c.ultima.getTime() : -Infinity,
    situacao: c => c.diasSemComprar
  });

  const r = el('div','rolo'); r.style.maxHeight='460px'; r.style.overflowY='auto';
  let h = `<table data-empilhar class="abc"><thead><tr>
    ${thOrd('#','pos','abc',{tipo:'texto'})}${thOrd('Classe','classe','abc',{tipo:'texto'})}${thOrd('Cliente','cliente','abc',{tipo:'texto'})}
    ${thOrd('Faturamento','faturamento','abc',{alinhar:'d'})}
    ${thOrd('% total','pctTotal','abc',{alinhar:'d'})}${thOrd('% acum.','pctAcum','abc',{alinhar:'d'})}
    ${thOrd('NFs','nfs','abc',{alinhar:'d'})}
    ${thOrd('Última compra','ultima','abc')}${thOrd('Situação','situacao','abc')}</tr></thead><tbody>`;
  listaOrdenada.forEach(c => {
    h += `<tr data-ck="${c.k}" data-nome="${c.nome}" tabindex="0" role="button" aria-label="Ver desempenho mensal de ${c.nome}">
      <td class="num" data-rot="Posição">${c.pos}</td>
      <td data-rot="Classe"><span class="classe c${c.classe}">${c.classe}</span></td>
      <td>${c.nome}</td>
      <td class="d num" data-rot="Faturamento">${brl(c.fat)}</td>
      <td class="d num" data-rot="% do total">${c.share.toFixed(1).replace('.',',')}%</td>
      <td class="d num" data-rot="% acumulado">${c.acc.toFixed(1).replace('.',',')}%</td>
      <td class="d num" data-rot="NFs">${c.nfs.size}</td>
      <td class="num" data-rot="Última compra">${dbr(c.ultima)}</td>
      <td data-rot="Situação"><span class="pill ${c.diasSemComprar<=jan?'ok':'no'}">${c.diasSemComprar<=jan?'ativo':c.diasSemComprar+' dias'}</span></td>
    </tr>`;
  });
  r.innerHTML = h + '</tbody></table>';

  const grid = el('div','abcGrid'); grid.style.marginTop = '12px';
  grid.appendChild(r);
  grid.appendChild(donutABC(lista, tot, noMes ? MES[filtroMes.mes]+'/'+ano : String(ano)));
  s.appendChild(grid);
  return s;
}

// Rampa derivada do azul médio da paleta (#0D5187), do escuro
// (cliente #1) ao claro (cliente #7). "Outros" fica em grafite, de
// propósito: é a única fatia que não representa um cliente real,
// e sim um resíduo.
function tintaAzul(nivel){
  const base = [0x0D,0x51,0x87];
  const t = Math.min(nivel*0.13, 0.72);
  return '#' + base.map(c => Math.round(c + (255-c)*t).toString(16).padStart(2,'0')).join('');
}

/* ---------- 6.3b donut da curva ABC (mesmos dados da tabela acima) ---------- */
function donutABC(lista, tot, rotulo){
  if(!lista.length || tot <= 0){
    const vazio = el('div','vazio'); vazio.style.cssText = 'padding:28px 14px;display:flex;flex-direction:column;justify-content:center;height:100%';
    vazio.innerHTML = `<h3>Sem dados disponíveis</h3>
      <p style="margin:0">Não há faturamento suficiente no período em foco para montar o gráfico.</p>`;
    return vazio;
  }
  const card = el('div','painel painel-donut');

  const MAXFATIAS = 7;
  const fatias = lista.slice(0, MAXFATIAS).map((c,i) => ({ nome:c.nome, share:c.share, cor:tintaAzul(i) }));
  if(lista.length > MAXFATIAS){
    const resto = lista.slice(MAXFATIAS).reduce((a,c)=>a+c.fat,0);
    fatias.push({ nome:'Outros', share: resto/tot*100, cor:'var(--grafite)' });
  }

  // Percentual sem casa decimal em todo o gráfico. Arredondar pode
  // fazer a soma dos rótulos dar 99% ou 101%; é o preço de ler rápido.
  const p0 = v => Math.round(v) + '%';

  // Área maior que o donut de propósito: fatia pequena não cabe rótulo
  // dentro, então ele sai para fora e precisa de margem lateral.
  const cx=125, cy=112, rE=84, rI=52;
  const DENTRO = 8;   // % mínimo para o rótulo caber dentro da fatia
  const MOSTRA = 2.5; // abaixo disso não rotula, só sobra no tooltip
  const pt = (a,r) => [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  let ang = -Math.PI/2;
  let svg = `<svg viewBox="0 0 250 224" role="img" aria-label="Participação dos maiores clientes no faturamento" style="max-width:280px;margin:0 auto;display:block">`;
  let rotulos = '';
  fatias.forEach(f => {
    const a0 = ang, a1 = ang + (f.share/100)*Math.PI*2;
    const grande = (a1-a0) > Math.PI ? 1 : 0;
    const [x0,y0]=pt(a0,rE), [x1,y1]=pt(a1,rE), [x2,y2]=pt(a1,rI), [x3,y3]=pt(a0,rI);
    svg += `<path d="M${x0.toFixed(2)},${y0.toFixed(2)} A${rE},${rE} 0 ${grande} 1 ${x1.toFixed(2)},${y1.toFixed(2)} L${x2.toFixed(2)},${y2.toFixed(2)} A${rI},${rI} 0 ${grande} 0 ${x3.toFixed(2)},${y3.toFixed(2)} Z" fill="${f.cor}"><title>${f.nome}: ${p0(f.share)}</title></path>`;

    if(f.share >= MOSTRA){
      const am = (a0+a1)/2;
      if(f.share >= DENTRO){
        const [lx,ly] = pt(am, (rE+rI)/2);
        rotulos += `<text x="${lx.toFixed(1)}" y="${(ly+4).toFixed(1)}" text-anchor="middle" font-family="IBM Plex Mono" font-size="12" font-weight="600" fill="#fff" pointer-events="none">${p0(f.share)}</text>`;
      } else {
        const [lx,ly] = pt(am, rE+13);
        const cos = Math.cos(am);
        const anc = cos > 0.3 ? 'start' : cos < -0.3 ? 'end' : 'middle';
        rotulos += `<text x="${lx.toFixed(1)}" y="${(ly+3.5).toFixed(1)}" text-anchor="${anc}" font-family="IBM Plex Mono" font-size="10.5" font-weight="600" fill="var(--grafite)" pointer-events="none">${p0(f.share)}</text>`;
      }
    }
    ang = a1;
  });
  svg += rotulos + '</svg>';

  const legenda = fatias.map(f =>
    `<span><i style="background:${f.cor}"></i>${f.nome} · <b style="font-family:var(--mono);font-weight:600;color:var(--tinta)">${p0(f.share)}</b></span>`
  ).join('');

  card.innerHTML = svg
    + `<div class="leg" style="flex-direction:column;gap:8px;justify-content:center;font-size:12.5px">${legenda}</div>`;
  card.insertAdjacentHTML('afterbegin',
    `<div style="text-align:center;margin-bottom:10px">
       <div style="font-family:var(--cond);font-size:13.5px;font-weight:600;color:var(--tinta)">Participação de vendas por cliente</div>
       <div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tenue);margin-top:2px">${rotulo}</div>
     </div>`);
  return card;
}

/* ---------- 6.4 clientes compradores por mês ---------- */
function secCompradores(B, ano, filtroMes){
  const s = el('section'); s.id = 'sec-compradores';
  const noMes = !!(filtroMes && filtroMes.ano === ano);
  cabecalho(s, 'Clientes compradores', 'unidades', noMes ? `${MES[filtroMes.mes]}/${ano} em foco` : null, 'clique num mês para focar');

  const cont = (y) => {
    const mes = Array.from({length:12}, () => new Set()), tot = new Set();
    B.filter(r => r.dt.getUTCFullYear() === y).forEach(r => {
      mes[r.dt.getUTCMonth()].add(r.ck); tot.add(r.ck);
    });
    return { mes: mes.map(x=>x.size), tot: tot.size };
  };
  const a = cont(ano), p = cont(ano-1);
  const ultimo = a.mes.reduce((u,v,i) => v>0 ? i : u, 0);

  const g = el('div','grade');
  if(noMes){
    const mi = filtroMes.mes;
    const dif = p.mes[mi] ? (a.mes[mi]/p.mes[mi] - 1)*100 : 0;
    g.appendChild(kpi(`Compradores em ${MES[mi]}/${ano}`, mil(a.mes[mi]), 'clientes distintos no mês'));
    g.appendChild(kpi(`Mesmo mês em ${ano-1}`, mil(p.mes[mi]), MES[mi]));
    g.appendChild(kpi('Variação', pct(dif), 'sobre o mesmo mês', dif));
  } else {
    const dif = p.tot ? (a.tot/p.tot - 1)*100 : 0;
    g.appendChild(kpi(`Compradores em ${ano}`, mil(a.tot), 'clientes distintos no ano'));
    g.appendChild(kpi(`Compradores em ${ano-1}`, mil(p.tot), 'ano inteiro'));
    g.appendChild(kpi('Variação', pct(dif), 'sobre o ano anterior', dif));
  }
  s.appendChild(g);

  const pn = el('div','painel'); pn.style.marginTop='12px';
  const W=1160,H=210,e=44,d=16,t=18,b=30;
  const max = Math.max(...a.mes, ...p.mes, 1)*1.2, lg=(W-e-d)/12;
  const y = v => t + (H-t-b)*(1 - v/max);
  let sv = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Clientes compradores por mês">`;
  for(let i=0;i<12;i++){
    const x = e+i*lg, w = lg*0.30;
    const ativo = noMes && filtroMes.mes===i;
    if(p.mes[i]) sv += `<rect x="${x+lg*0.16}" y="${y(p.mes[i])}" width="${w}" height="${H-b-y(p.mes[i])}" fill="#C2CCE2"/>`;
    if(a.mes[i]) sv += `<rect data-mes="${i}" data-ano="${ano}" x="${x+lg*0.50}" y="${y(a.mes[i])}" width="${w}" height="${H-b-y(a.mes[i])}" fill="var(--azul)" opacity="${i===ultimo && !ativo?0.45:1}"${ativo?' stroke="var(--tinta)" stroke-width="2"':''}><title>${ativo ? 'Clique para soltar o foco' : `Clique para focar em ${MES[i]}/${ano}`}</title></rect>
      <text x="${x+lg*0.65}" y="${y(a.mes[i])-5}" text-anchor="middle" font-family="IBM Plex Mono" font-size="10" fill="#5C6689">${a.mes[i]}</text>`;
    sv += `<text x="${x+lg/2}" y="${H-10}" text-anchor="middle" font-family="IBM Plex Sans Condensed" font-size="${ativo?12:11}" font-weight="${ativo?700:400}" fill="${ativo?'var(--azul)':'#5C6689'}">${MES[i]}</text>`;
  }
  sv += `<line x1="${e}" y1="${H-b}" x2="${W-d}" y2="${H-b}" stroke="#00034A"/></svg>`;
  pn.innerHTML = `<div class="graf-rolo">${sv}</div>`;
  s.appendChild(pn);
  return s;
}

/* ---------- 6.5 perdidos ---------- */
function secPerdidos(B, hoje, jan, filtroMes){
  const { H, ref } = corteHistorico(B, hoje, filtroMes);
  const s = el('section'); s.id = 'sec-perdidos';
  cabecalho(s, 'Clientes perdidos', 'comercial', filtroMes ? `como estava em ${dbr(ref)}` : null);

  const m = {};
  H.forEach(r => {
    m[r.ck] = m[r.ck] || { nome:r.cn, fat:0, ult:r.dt };
    m[r.ck].fat += r.valor;
    if(r.dt > m[r.ck].ult) m[r.ck].ult = r.dt;
  });
  const lista = Object.values(m)
    .map(c => ({...c, dias: diasEntre(c.ult, ref)}))
    .filter(c => c.dias > jan)
    .sort((a,b) => b.fat - a.fat);

  const g = el('div','grade');
  g.appendChild(kpi('Clientes perdidos', mil(lista.length), `sem compra há mais de ${jan} dias`));
  g.appendChild(kpi('Faturamento histórico parado', brl(lista.reduce((a,b)=>a+b.fat,0)), 'valor total desses clientes'));
  g.appendChild(kpi('Maior perda isolada', lista.length ? brl(lista[0].fat) : '—', lista.length ? lista[0].nome : ''));
  s.appendChild(g);

  const r = el('div','rolo'); r.style.marginTop='12px'; r.style.maxHeight='400px'; r.style.overflowY='auto';
  const listaOrdenada = ordenar(lista, 'perdidos', {
    cliente: c => c.nome.toLowerCase(),
    faturamento: c => c.fat,
    ultima: c => c.ult.getTime(),
    dias: c => c.dias
  });
  let h = `<table data-empilhar><thead><tr>
    ${thOrd('Cliente','cliente','perdidos',{tipo:'texto'})}${thOrd('Faturamento histórico','faturamento','perdidos',{alinhar:'d'})}
    ${thOrd('Última compra','ultima','perdidos')}${thOrd('Dias sem comprar','dias','perdidos',{alinhar:'d'})}</tr></thead><tbody>`;
  listaOrdenada.forEach(c => {
    h += `<tr><td>${c.nome}</td><td class="d num" data-rot="Faturamento histórico">${brl(c.fat)}</td>
      <td class="num" data-rot="Última compra">${dbr(c.ult)}</td>
      <td class="d num" data-rot="Dias sem comprar" style="color:var(--baixa)">${c.dias}</td></tr>`;
  });
  r.innerHTML = h + '</tbody></table>';
  s.appendChild(r);
  return s;
}

/* ---------- 6.6 cadência ---------- */
function secCadencia(B, hoje, filtroMes){
  const { H, ref } = corteHistorico(B, hoje, filtroMes);
  const s = el('section'); s.id = 'sec-cadencia';
  cabecalho(s, 'Retomada por cadência', 'worklist', filtroMes ? `como estava em ${dbr(ref)}` : null);

  const m = {};
  H.forEach(r => {
    if(ehDrop(r.cn)) return;
    m[r.ck] = m[r.ck] || { nome:r.cn, datas:new Set(), r12:0 };
    m[r.ck].datas.add(r.emissao);
    if(diasEntre(r.dt, ref) <= 365) m[r.ck].r12 += r.valor;
  });

  const linhas = [];
  Object.values(m).forEach(c => {
    const ds = [...c.datas].map(x => new Date(x+'T00:00:00Z')).sort((a,b)=>a-b);
    if(ds.length < CONFIG.MIN_COMPRAS_RITMO) return;
    const gaps = ds.slice(1).map((d,i) => diasEntre(ds[i], d));
    const ritmo = Math.round(mediana(gaps));
    const ult = ds[ds.length-1];
    const semComprar = diasEntre(ult, ref);
    linhas.push({ nome:c.nome, ritmo, n:ds.length, ult, semComprar,
                  atraso: semComprar - ritmo, r12:c.r12 });
  });

  const comRitmo = linhas.length;
  const abas = el('div','abas');

  const pnKpi = el('div','grade');
  s.appendChild(pnKpi);
  s.appendChild(abas);
  const rolo = el('div','rolo'); rolo.style.maxHeight='440px'; rolo.style.overflowY='auto';
  s.appendChild(rolo);

  function pintar(){
    const fila = linhas.filter(l => l.atraso >= CORTE_CADENCIA).sort((a,b) => b.r12 - a.r12);
    pnKpi.innerHTML = '';
    pnKpi.appendChild(kpi('Clientes com cadência medível', mil(comRitmo), `${CONFIG.MIN_COMPRAS_RITMO}+ compras`));
    pnKpi.appendChild(kpi('Na hora de ligar', mil(fila.length), `atraso de ${CORTE_CADENCIA} dias ou mais`));
    pnKpi.appendChild(kpi('Receita de 12 meses na fila', brl(fila.reduce((a,b)=>a+b.r12,0)), 'peso financeiro desses clientes'));

    const filaOrdenada = ordenar(fila, 'cadencia', {
      cliente: c => c.nome.toLowerCase(),
      ritmo: c => c.ritmo,
      compras: c => c.n,
      ultima: c => c.ult.getTime(),
      dias: c => c.semComprar,
      atraso: c => c.atraso,
      receita: c => c.r12
    });

    let h = `<table data-empilhar><thead><tr>
      ${thOrd('Cliente','cliente','cadencia',{tipo:'texto'})}${thOrd('Compra a cada','ritmo','cadencia',{alinhar:'d'})}
      ${thOrd('Compras','compras','cadencia',{alinhar:'d'})}${thOrd('Última compra','ultima','cadencia')}
      ${thOrd('Dias sem comprar','dias','cadencia',{alinhar:'d'})}${thOrd('Atraso','atraso','cadencia',{alinhar:'d'})}
      ${thOrd('Receita 12m','receita','cadencia',{alinhar:'d'})}</tr></thead><tbody>`;
    if(!filaOrdenada.length) h += `<tr><td colspan="7" style="color:var(--grafite);padding:24px;text-align:center">Ninguém atrasado nesse corte. Aumente o corte ou comemore.</td></tr>`;
    filaOrdenada.forEach(l => {
      h += `<tr><td>${l.nome}</td>
        <td class="d num" data-rot="Compra a cada">${l.ritmo} d</td>
        <td class="d num" data-rot="Compras">${l.n}</td>
        <td class="num" data-rot="Última compra">${dbr(l.ult)}</td>
        <td class="d num" data-rot="Dias sem comprar">${l.semComprar}</td>
        <td class="d" data-rot="Atraso"><span class="pill at">+${l.atraso} d</span></td>
        <td class="d num" data-rot="Receita 12m">${brl(l.r12)}</td></tr>`;
    });
    rolo.innerHTML = h + '</tbody></table>';
    [...abas.children].forEach(b => b.classList.toggle('on', +b.dataset.v === CORTE_CADENCIA));
  }

  [21,30,45].forEach(v => {
    const b = el('button','aba', `${v} dias ou mais`);
    b.dataset.v = v;
    // Muda o estado persistido e refaz o render inteiro — mesmo padrão
    // do clique de mês e do clique de cabeçalho, então o corte escolhido
    // aqui sobrevive a qualquer uma dessas outras interações também.
    b.onclick = () => { CORTE_CADENCIA = v; render(); };
    abas.appendChild(b);
  });
  pintar();
  return s;
}

/* ==========================================================
   7. IMPORTAÇÃO DO CSV
   O RFNF613 sai com linhas de cabeçalho de página, de
   representante e de cidade misturadas aos dados. O parser
   abaixo reproduz exatamente esse formato.
   ========================================================== */
const fundo = $('#fundo');
$('#btnImportar').onclick = () => { fundo.classList.add('on'); };
$('#btnFechar').onclick   = () => { fundo.classList.remove('on'); };
fundo.onclick = e => { if(e.target === fundo) fundo.classList.remove('on'); };

const zona = $('#zona');
['dragenter','dragover'].forEach(e => zona.addEventListener(e, ev => { ev.preventDefault(); zona.classList.add('dentro'); }));
['dragleave','drop'].forEach(e => zona.addEventListener(e, ev => { ev.preventDefault(); zona.classList.remove('dentro'); }));
zona.addEventListener('drop', ev => { if(ev.dataTransfer.files[0]) ler(ev.dataTransfer.files[0]); });
$('#arquivo').onchange = ev => { if(ev.target.files[0]) ler(ev.target.files[0]); };

function diz(txt){ const l = $('#log'); l.style.display='block'; l.textContent += txt + '\n'; l.scrollTop = l.scrollHeight; }

// O Excel grava CSV ora em UTF-8, ora em Windows-1252, dependendo da
// opção escolhida. Tenta UTF-8 e cai para 1252 se aparecer lixo.
function decodificar(buffer){
  const utf = new TextDecoder('utf-8').decode(buffer);
  const lixo = (utf.match(/\uFFFD/g) || []).length;
  if(lixo === 0) return utf;
  return new TextDecoder('windows-1252').decode(buffer);
}

function ler(file){
  $('#log').textContent = ''; PENDENTE = null; $('#btnGravar').disabled = true;
  const fr = new FileReader();
  fr.onload = () => {
    try{
      const linhas = parseRFNF613(decodificar(fr.result));
      if(!linhas.length){
        diz('Nenhuma linha de faturamento foi reconhecida. Diagnóstico:');
        diz(`  separador detectado ....... ${DIAG.sep}`);
        diz(`  decimal detectado ......... ${DIAG.decimal}`);
        diz(`  linhas no arquivo ......... ${DIAG.totalLinhas}`);
        diz(`  colunas por linha ......... ${DIAG.colunas}  (o esperado é 18 a 20)`);
        diz(`  descartadas: coluna 1 não é número de NF ... ${DIAG.rej.naoNumerico}`);
        diz(`  descartadas: data não reconhecida ......... ${DIAG.rej.semData}`);
        diz(`  descartadas: valor zerado ................. ${DIAG.rej.semValor}`);
        if(DIAG.exemplos.semData)  diz(`  exemplo de data recusada: ${DIAG.exemplos.semData}`);
        if(DIAG.exemplos.semValor) diz(`  exemplo de valor recusado: ${DIAG.exemplos.semValor}`);
        diz('  primeiras linhas do arquivo:');
        DIAG.primeiras.forEach((l,i) => diz(`   ${i+1}| ${l}`));
        return;
      }
      const datas = linhas.map(l => l.emissao).sort();
      PENDENTE = { nome:file.name, linhas };
      diz(`Arquivo: ${file.name}`);
      diz(`Linhas de item: ${mil(linhas.length)}`);
      diz(`Período: ${datas[0]} a ${datas[datas.length-1]}`);
      diz(`NFs: ${mil(new Set(linhas.map(l=>l.nf+l.emissao)).size)}`);
      diz(`Clientes: ${mil(new Set(linhas.map(l=>l.cliente_cod)).size)}`);
      diz(`Faturamento: ${brl(linhas.reduce((a,b)=>a+b.valor,0))}`);
      diz('Confira os números acima. Se baterem com o Senior, grave.');
      $('#btnGravar').disabled = false;
    }catch(err){ diz('Não deu para ler o arquivo: ' + err.message); }
  };
  fr.readAsArrayBuffer(file);
}

// Guarda o motivo de cada linha descartada, para o diagnóstico.
let DIAG = null;

function parseRFNF613(txt){
  const cru = txt.split(/\r?\n/).filter(l => l.trim());

  // Delimitador: conta ocorrências fora de aspas nas primeiras linhas.
  const amostra = cru.slice(0,60).join('\n');
  const conta = ch => (amostra.split(ch).length - 1);
  const cand = [[';',conta(';')], [',',conta(',')], ['\t',conta('\t')], ['|',conta('|')]];
  cand.sort((a,b) => b[1]-a[1]);
  const sep = cand[0][1] > 0 ? cand[0][0] : ';';

  // Decimal: se aparecer "1.234,56" ou "12,50" é pt-BR. Se o separador
  // for vírgula, o decimal obrigatoriamente é ponto.
  const decimalVirgula = sep !== ',' && /\d,\d{2}\b/.test(amostra);

  const num = s => {
    if(s == null) return 0;
    let v = String(s).trim().replace(/[\s\u00A0R$]/g,'');
    if(!v || v === '-') return 0;
    v = decimalVirgula ? v.replace(/\./g,'').replace(',','.') : v.replace(/,/g,'');
    const n = parseFloat(v);
    return isNaN(n) ? 0 : n;
  };

  const data = s => {
    let v = String(s||'').trim();
    if(!v || v === '-') return null;
    // serial do Excel, com ou sem separador de milhar: 45672 / 45.672 / 45,672
    const puro = v.replace(/[.,\s]/g,'');
    if(/^\d{4,6}$/.test(puro) && !v.includes('/') && !v.includes('-')){
      const n = +puro;
      if(n > 20000 && n < 70000)
        return new Date(Date.UTC(1899,11,30) + n*86400000).toISOString().slice(0,10);
    }
    v = v.split(/[\sT]/)[0];                        // descarta hora, se houver
    let m = v.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);   // d/m/aa(aa)
    if(m){
      let [_,d,mo,y] = m;
      if(y.length === 2) y = (+y > 50 ? '19' : '20') + y;
      return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    m = v.match(/^(\d{4})[\-\/](\d{2})[\-\/](\d{2})$/);               // aaaa-mm-dd
    if(m) return `${m[1]}-${m[2]}-${m[3]}`;
    return null;
  };

  const out = [];
  const rej = { naoNumerico:0, semData:0, semValor:0 };
  const exemplos = { semData:null, semValor:null };
  let rep = null, cidade = null, uf = null;

  for(const linha of cru){
    const c = dividir(linha, sep).map(x => x.replace(/^["\s]+|["\s]+$/g,''));
    const a = c[0] || '';

    if(/^Representante/i.test(a)){ rep = (c[3]||'').trim() || null; continue; }
    if(/^Cidade/i.test(a)){ cidade = (c[1]||'').trim() || null; uf = (c[5]||'').trim() || null; continue; }
    if(!/^\d+$/.test(a)){ rej.naoNumerico++; continue; }

    const dt = data(c[1]);
    if(!dt){ rej.semData++; if(!exemplos.semData) exemplos.semData = c.slice(0,4).join(' | '); continue; }
    const valor = num(c[14]);
    if(!valor){ rej.semValor++; if(!exemplos.semValor) exemplos.semValor = c.slice(12,16).join(' | '); continue; }

    out.push({
      nf: a, emissao: dt,
      cliente_cod : (c[2] ||'').trim(),
      cliente_nome: (c[3] ||'').trim(),
      produto_cod : (c[5] ||'').trim() || null,
      derivacao   : (c[6] ||'').trim() || null,
      produto_desc: (c[8] ||'').trim() || null,
      cond_pgto   : (c[9] ||'').trim() || null,
      qtd         : num(c[10]),
      um          : (c[11]||'').trim() || null,
      preco_unit  : num(c[12]),
      valor,
      transportadora:(c[17]||'').trim() || null,
      representante: rep, cidade, uf
    });
  }

  DIAG = {
    sep: sep === '\t' ? 'TAB' : sep,
    decimal: decimalVirgula ? 'vírgula (pt-BR)' : 'ponto',
    totalLinhas: cru.length,
    colunas: dividir(cru[6] || cru[0] || '', sep).length,
    rej, exemplos,
    primeiras: cru.slice(0,8).map(l => l.slice(0,150))
  };
  return out;
}

// divisor de CSV que respeita aspas
function dividir(linha, sep){
  const out = []; let atual = '', aspas = false;
  for(let i=0;i<linha.length;i++){
    const ch = linha[i];
    if(ch === '"'){
      if(aspas && linha[i+1] === '"'){ atual += '"'; i++; }
      else aspas = !aspas;
    } else if(ch === sep && !aspas){ out.push(atual); atual = ''; }
    else atual += ch;
  }
  out.push(atual);
  return out;
}

/* ---------- gravar ---------- */
$('#btnGravar').onclick = async function(){
  if(!PENDENTE) return;
  this.disabled = true; $('#btnFechar').disabled = true;
  const { data:{ user } } = await sb.auth.getUser();
  const datas = PENDENTE.linhas.map(l => l.emissao).sort();
  let novaId = null;

  try{
    diz('Registrando a importação.');
    const { data:imp, error:e1 } = await sb.from('importacoes').insert({
      arquivo: PENDENTE.nome, linhas: PENDENTE.linhas.length,
      periodo_ini: datas[0], periodo_fim: datas[datas.length-1],
      usuario_id: user.id, usuario_email: user.email
    }).select().single();
    if(e1) throw e1;
    novaId = imp.id;

    const passo = 500;
    for(let i=0;i<PENDENTE.linhas.length;i+=passo){
      const lote = PENDENTE.linhas.slice(i,i+passo).map(l => ({...l, importacao_id: novaId}));
      const { error:e2 } = await sb.from('nf_itens').insert(lote);
      if(e2) throw e2;
      diz(`Gravadas ${mil(Math.min(i+passo, PENDENTE.linhas.length))} de ${mil(PENDENTE.linhas.length)} linhas.`);
    }

    diz('Removendo a carga anterior.');
    const { error:e3 } = await sb.from('importacoes').delete().neq('id', novaId);
    if(e3) throw e3;

    diz('Pronto. Atualizando o dashboard.');
    PENDENTE = null;
    fundo.classList.remove('on');
    await carregar();
  }catch(err){
    diz('Falhou: ' + (err.message || err));
    if(novaId){
      await sb.from('importacoes').delete().eq('id', novaId);
      diz('A carga parcial foi desfeita. Os dados anteriores continuam intactos.');
    }
  }finally{
    this.disabled = false; $('#btnFechar').disabled = false;
  }
};
</script>
